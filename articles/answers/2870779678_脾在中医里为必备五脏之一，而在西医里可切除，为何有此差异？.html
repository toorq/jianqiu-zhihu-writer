</style></head><body><h1>脾在中医里为必备五脏之一，而在西医里可切除，为何有此差异？</h1>
<p><small>回答：2023-02-01 13:58｜更新：2023-02-01 13:58｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/535164148/answer/2870779678">https://www.zhihu.com/question/535164148/answer/2870779678</a></small></p><hr><p data-pid="_BTsUQFU">就我浅薄的中医业余票友的知识都知道。</p><p data-pid="e6aPg2uF">中医的心肝脾胃肾，不是指具体的某个器官。</p><p data-pid="MTVPuwK9">而是指某种功能分类，心肝脾胃肾，金木水火土，是一种分类贬值的思想。</p><p data-pid="o0ygeVtX">类似于软件的UML的动态视图，你不要以为心肝脾胃肾是静态图。</p></body></html>
