</style></head><body><h1>国人吐槽在中国卖不动的丰田，为何依然靠欧美市场全球销量第一？</h1>
<p><small>回答：2024-03-05 14:29｜更新：2024-03-05 14:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/630073720/answer/3419372962">https://www.zhihu.com/question/630073720/answer/3419372962</a></small></p><hr><p data-pid="n1EGGQ7V">能不能这么提问。</p><p data-pid="sY-X5ke1">为什么欧美市场称霸，全球销量第一的丰田在中国都卖不动。</p><p data-pid="DxiMPwf3">这个问题带有引导性，前者讽刺中国市场“不识抬举”，后者说明中国市场有“先进性”。</p><p><br></p><p data-pid="SxL5Fbzc">还有，不管是哪国人，合法的卖任何品牌的车子都不涉及灵魂，人家用自己的钱买车，不偷不抢，国家允许买卖，和灵魂有什么关系。</p></body></html>
