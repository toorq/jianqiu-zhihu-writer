<p><small>回答：2026-04-20 00:12｜更新：2026-04-20 00:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/649308365/answer/2029351692571878770">https://www.zhihu.com/question/649308365/answer/2029351692571878770</a></small></p><hr><p data-pid="rW-9yKId">今天看到一个知乎网友的回答，说得挺对的。</p><p data-pid="KTgztmyX">公务员不是一个工作，是一种阶级。</p><p data-pid="yX0yKglH">我有个厦大硕士毕业比我还大几岁，40多岁了吧现在，的程序员朋友，前阵子失业在家，他和我说，很后悔毕业的时候没有考公务员。当时毕业的时候，他对体制内工作是很鄙视的……</p></body></html>
