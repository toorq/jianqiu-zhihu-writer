</style></head><body><h1>4 岁多的女儿一直问我要钢琴，怎么办？买电钢琴代替合适吗？</h1>
<p><small>回答：2015-02-26 23:43｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/28377607/answer/40632502">https://www.zhihu.com/question/28377607/answer/40632502</a></small></p><hr><p data-pid="vzFKjz2g">买电钢。</p><p data-pid="vZs6oggq">价格不高，便宜的2k左右就能搞定，5k左右的就已经不错。</p><p data-pid="N64gczkt">不用调音所以保养成本特别低。</p><p data-pid="RQpk6x9M">现阶段主要是培养兴趣，也当做投入一个手机的钱。</p></body></html>
