<p><small>回答：2023-12-29 19:21｜更新：2023-12-29 19:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/630512928/answer/3343184979">https://www.zhihu.com/question/630512928/answer/3343184979</a></small></p><hr><p data-pid="D11qR_2F">资产的价格，是买方决定的还是卖方觉定的？</p><p data-pid="TBV6s5fg">是买方决定的，因为买方手上有钱。</p><p data-pid="NG-8zvXM">你买的时候就已经是投票了，认可了这个价格。</p><p data-pid="2DtEWzmB">别想什么值不值，游戏是带来快乐的，你开心就好。</p></body></html>
