<p><small>回答：2026-04-08 21:42｜更新：2026-04-08 21:42｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2004938442837092198/answer/2025327661350752861">https://www.zhihu.com/question/2004938442837092198/answer/2025327661350752861</a></small></p><hr><p data-pid="6eSNEgdq">科技的发展太残酷的，不断挤压的是“能干的”人。</p><p data-pid="IxykA9n2">在这轮AI浪潮中，有位置，也就是俗称屁股的人是得利的。</p><p data-pid="4zGsvBEf">在市场中有位置，有客户，有资源的人也是得利的。</p><p data-pid="Jnzpq-lX">原来靠“能干”输出劳动力的人，是最不利的。</p></body></html>
