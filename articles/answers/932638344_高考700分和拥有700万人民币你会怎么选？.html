</style></head><body><h1>高考700分和拥有700万人民币你会怎么选？</h1>
<p><small>回答：2019-12-12 14:24｜更新：2019-12-12 14:25｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/355774792/answer/932638344">https://www.zhihu.com/question/355774792/answer/932638344</a></small></p><hr><p data-pid="1aUjm7rb">肯定选700分。</p><p data-pid="MqSxZ77q">要是有能力考到700分。</p><p data-pid="M-nUujWT">挣到700w真的是小意思。</p><p data-pid="nP8SygFl">知识带给人的财富，远超这几百万人民币的想象力。<br></p><p data-pid="IymzeMLM">不过会问这样问题的人……好像还是选700w好，毕竟拿个700分，然后去拼杀的日子好像不适合问这个问题的人。</p><p data-pid="5Z-VpbRG">拿个700w，去买买楼，收收租，小富即安、老婆孩子热炕头的过一生也挺好的。</p></body></html>
