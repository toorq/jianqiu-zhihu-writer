</style></head><body><h1>历史上中国死了那么多人都土葬，为什么没感觉有那么多坟墓？</h1>
<p><small>回答：2022-08-03 14:38｜更新：2023-11-28 13:25｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/486329701/answer/2607767044">https://www.zhihu.com/question/486329701/answer/2607767044</a></small></p><hr><p data-pid="-gU27n36">按照习俗，一般扫墓扫三代，三代以后，轮回转世，各有所归，就不用扫墓了。</p><p data-pid="U7G_WT3-">然后就统称为祖宗，供奉在祠堂中。</p><hr><p data-pid="1_ZAKuR-">这里补充一下，不是说三代后才轮回转世，而是说3代过去，一般都轮回转世去了。</p></body></html>
