</style></head><body><h1>车里放个什么东西，既能防身，又不违法，看着还吓人的？</h1>
<p><small>回答：2024-08-07 20:48｜更新：2024-08-15 07:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/632563155/answer/3587202123">https://www.zhihu.com/question/632563155/answer/3587202123</a></small></p><hr><p data-pid="juxmz53C">带点木棍什么的钝器就好了，不要带匕首，刀等利器，毕竟是为了防身，不是为了做killer。</p><p data-pid="fp7HYmFY">没有足够的训练基础，利器最容易的是伤到自己。</p><p data-pid="jsqtqh1b">就算对方拿着匕首，手里有个50cm左右短棍，就不用怕了。</p><p data-pid="VK0Zrfur">木棍在任何时候都不违法。</p></body></html>
