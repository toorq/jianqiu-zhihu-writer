</style></head><body><h1>Linux上的各种命令本质上都是小程序吗？</h1>
<p><small>回答：2018-12-20 16:38｜更新：2020-05-18 22:26｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/34609277/answer/556076906">https://www.zhihu.com/question/34609277/answer/556076906</a></small></p><hr><p data-pid="A1BLGO60">实时，这是UNIX的核心思想，KISS原则。</p><p data-pid="AxYvAw1F">每个东西小一点，傻一点，拼起来就是一个很了不起的东西。</p><p data-pid="wlp_P5cJ">不管是世界的原子还是人体的细胞，无一不是这样的东西。</p><p data-pid="R_9nnF0D">所以，Linux的命令的确本质上就是小程序。</p><p data-pid="HCObRP8w">这些小程序用管道，重定向符连接起来，就能像搭积木一样做很多了不起的事情：）</p></body></html>
