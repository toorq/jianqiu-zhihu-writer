</style></head><body><h1>为何很多人认为衡水中学学生是「读书机器」？</h1>
<p><small>回答：2019-03-02 09:28｜更新：2019-03-02 09:28｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/312914110/answer/611958660">https://www.zhihu.com/question/312914110/answer/611958660</a></small></p><hr><p data-pid="LO25f6Ly">因为奋斗这种事情，如果是自己选择的，自然不是坏事，如果是别人逼迫的，就不好了。</p><p data-pid="6gsXieTw">我见过很多人，也面试过很多年轻人。大多数人表示后悔年轻的时候没有好好读书，把书读的更好一点。</p><p data-pid="R10AXRDK">人生就是这么有意思，在可以做选择的时候，我们还年轻，不懂得做选择，在懂得做选择的时候，已经没有机会做选择。</p></body></html>
