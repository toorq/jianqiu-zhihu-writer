</style></head><body><h1>提到武术，为什么想到的都是黄飞鸿叶问还有方世玉？为什么都是广东人？</h1>
<p><small>回答：2024-02-15 10:55｜更新：2024-02-15 10:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/644218819/answer/3396670494">https://www.zhihu.com/question/644218819/answer/3396670494</a></small></p><hr><p data-pid="_WOXor-Y">都是中国人，拳术没有南北。</p><p data-pid="xKnCrO0y">无非是早起香港电影发达，特别是港产武打片，是多少人美好的少年记忆。</p><p data-pid="J6n16mlC">人家港产功夫片当然拍广东当地的武术流派，要不然演员都不好找。</p><p data-pid="kEYhRq31">《少林寺》等李连杰主演的功夫片就是以北方武术流派为主。</p><p data-pid="L01M6Z3K">中国古代拳师往往走南闯北，南北武术并没有现在小说，电影所述的那么割裂。</p></body></html>
