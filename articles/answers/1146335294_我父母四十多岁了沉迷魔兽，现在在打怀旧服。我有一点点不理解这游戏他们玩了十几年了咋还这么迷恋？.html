<p><small>回答：2020-04-11 23:03｜更新：2020-04-11 23:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/378964038/answer/1146335294">https://www.zhihu.com/question/378964038/answer/1146335294</a></small></p><hr><p data-pid="5LJzA5ZT">我虽然不怎么玩魔兽，可是看到这个问题还是挺感慨的。</p><p data-pid="ErIaItMd">其实回忆是一种祭奠，用现在的时间，祭奠过去的时间。</p><p data-pid="CjKScUEP">就好像用活人去祭奠死人一样，</p><p data-pid="YRTb4Quz">残忍。</p></body></html>
