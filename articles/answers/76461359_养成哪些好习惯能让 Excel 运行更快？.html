</style></head><body><h1>养成哪些好习惯能让 Excel 运行更快？</h1>
<p><small>回答：2015-12-12 20:11｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/27745783/answer/76461359">https://www.zhihu.com/question/27745783/answer/76461359</a></small></p><hr><p data-pid="EPVW6JBl">一个好办法是把表格设置一下，不要让表格每次修改都重算。</p><p data-pid="Bus1BlIc">在修改好数据以后统一按F9重算。</p><p data-pid="n62tcvPN">工作的关系我有一个几十万条数据的CRM表，经常更新，上面还有一堆我写的vlookup公式，有些还有多重嵌套的vlookup公式。不用这种方法，每次修改一个小数据都是漫长的等待。</p><p data-pid="VSbSdS03">以下是excel 2013的设置截图。</p><figure><noscript><img src="https://picx.zhimg.com/50/e7279ac56687d3fa7fdae5c24d873b75_720w.png?source=c8b7c179" data-rawwidth="834" data-rawheight="646" data-original-token="e7279ac56687d3fa7fdae5c24d873b75" class="origin_image zh-lightbox-thumb" width="834" data-original="https://picx.zhimg.com/e7279ac56687d3fa7fdae5c24d873b75_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='834'%20height='646'&gt;&lt;/svg&gt;" data-rawwidth="834" data-rawheight="646" data-original-token="e7279ac56687d3fa7fdae5c24d873b75" class="origin_image zh-lightbox-thumb lazy" width="834" data-original="https://picx.zhimg.com/e7279ac56687d3fa7fdae5c24d873b75_r.jpg?source=c8b7c179" data-actualsrc="https://picx.zhimg.com/50/e7279ac56687d3fa7fdae5c24d873b75_720w.png?source=c8b7c179"></figure></body></html>
