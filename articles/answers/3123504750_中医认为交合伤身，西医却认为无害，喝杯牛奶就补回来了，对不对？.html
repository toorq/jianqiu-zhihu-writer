</style></head><body><h1>中医认为交合伤身，西医却认为无害，喝杯牛奶就补回来了，对不对？</h1>
<p><small>回答：2023-07-18 09:20｜更新：2024-03-24 15:34｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/457751500/answer/3123504750">https://www.zhihu.com/question/457751500/answer/3123504750</a></small></p><hr><p data-pid="_ZtFdhE0">中医从来没有人为交合伤身，中医是认为过度交合，纵欲伤身。</p><p data-pid="eyLFND5W">会问这种问题的人肯定是语文不过关（古文），搞不清楚什么叫节欲，节欲不叫禁欲，邪淫不叫节欲。</p><p data-pid="u4DfEiWw">阴阳调和是有益身心健康的。</p><p data-pid="vsNMkNMx"></p></body></html>
