</style></head><body><h1>你对日本侵华看法是怎样的？</h1>
<p><small>回答：2015-04-30 10:55｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/29877071/answer/46327927">https://www.zhihu.com/question/29877071/answer/46327927</a></small></p><hr><p data-pid="v4NmTzY5">我的理解比较简单。</p><p data-pid="FjvWbOkK">一个强者被人欺负了，一定会回去好好练，今后走着瞧。一个弱智被欺负了，哭一哭，就算了，然后继续被欺负。</p><p data-pid="tQsB-AZH">好在现在中华总算走出来了，装了这么多年孙子，总算强起来了。</p><p data-pid="zTvqtXLz">但是这个时候如果老记挂这小时候，隔壁老王欺负过我，我要怎么怎么报复，而不是想着我怎么团结老王，让我更强就土鳖了。因为格局不一样了。</p></body></html>
