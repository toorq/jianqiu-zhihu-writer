</style></head><body><h1>在你心中,《荒野大镖客：救赎2》是否已超越《巫师3》,为什么？</h1>
<p><small>回答：2020-12-25 09:36｜更新：2020-12-25 09:36｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/304934998/answer/1644500685">https://www.zhihu.com/question/304934998/answer/1644500685</a></small></p><hr><p data-pid="PHt3Cc4V">超过了，超过太多了。</p><p data-pid="6ujh-3Y6">巫师我玩了3小时就玩不下去了。</p><figure data-size="normal"><noscript><img src="https://pic1.zhimg.com/50/v2-f9c41421d9b0440e3de1bb0a19d8c299_720w.jpg?source=c8b7c179" data-caption="" data-size="normal" data-rawwidth="795" data-rawheight="385" data-original-token="v2-950f8412b6bc86dba627120c7065340d" data-default-watermark-src="https://picx.zhimg.com/50/v2-94a1d3e478384f6ff9407e2ae07ae9c9_720w.jpg?source=c8b7c179" class="origin_image zh-lightbox-thumb" width="795" data-original="https://picx.zhimg.com/v2-f9c41421d9b0440e3de1bb0a19d8c299_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='795'%20height='385'&gt;&lt;/svg&gt;" data-caption="" data-size="normal" data-rawwidth="795" data-rawheight="385" data-original-token="v2-950f8412b6bc86dba627120c7065340d" data-default-watermark-src="https://picx.zhimg.com/50/v2-94a1d3e478384f6ff9407e2ae07ae9c9_720w.jpg?source=c8b7c179" class="origin_image zh-lightbox-thumb lazy" width="795" data-original="https://picx.zhimg.com/v2-f9c41421d9b0440e3de1bb0a19d8c299_r.jpg?source=c8b7c179" data-actualsrc="https://pic1.zhimg.com/50/v2-f9c41421d9b0440e3de1bb0a19d8c299_720w.jpg?source=c8b7c179"></figure><p data-pid="lm8lp1xl">大表哥2，玩了几十个小时，到亚瑟死去。</p><p data-pid="UwLKkF9U">然后关掉游戏后的几十个小时，我的精神还在这个故事里面走不出来。</p><p data-pid="-eaWwmoV">我必须克制自己，告诉自己年纪大了，要少玩。</p><figure data-size="normal"><noscript><img src="https://pica.zhimg.com/50/v2-f93bd3f75c6ee1ca36a9564cd1f7f8b1_720w.jpg?source=c8b7c179" data-caption="" data-size="normal" data-rawwidth="1074" data-rawheight="404" data-original-token="v2-9d13cb49c110eb83419197fda3dc2efd" data-default-watermark-src="https://picx.zhimg.com/50/v2-b9eda850f2741ad771c0a67d9bb6b9bd_720w.jpg?so
