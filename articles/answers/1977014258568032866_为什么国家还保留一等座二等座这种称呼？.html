<p><small>回答：2025-11-26 14:02｜更新：2025-11-26 14:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/707622537/answer/1977014258568032866">https://www.zhihu.com/question/707622537/answer/1977014258568032866</a></small></p><hr><p data-pid="b9ReyPYs">因为我们只想到，一等座二等座的“座”，</p><p data-pid="gwua7tzM">并没有没有想到一等人二等人这种东西。</p><p data-pid="TVDx-HzY">要警惕这种泛政治化，把生活中的一切都政治化，变成支持不绝对就是绝对不支持的风气，</p><p data-pid="aYsZl9Gv">最后人人都是魔怔人。</p></body></html>
