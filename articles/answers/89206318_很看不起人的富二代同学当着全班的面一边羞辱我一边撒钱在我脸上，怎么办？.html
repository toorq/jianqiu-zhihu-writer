</style></head><body><h1>很看不起人的富二代同学当着全班的面一边羞辱我一边撒钱在我脸上，怎么办？</h1>
<p><small>回答：2016-03-04 14:51｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/38583619/answer/89206318">https://www.zhihu.com/question/38583619/answer/89206318</a></small></p><hr><p data-pid="R1rKT1O_">如果是现在的我我会这么干。</p><p data-pid="NrvF8qFA">在他拿钱撒你脸上的时候，默默的捡钱，等他都撒完了。把钱还给他，轻轻的说一句：莫欺少年穷。</p><p data-pid="0p7aOj1y">只要你内心强大，就没有人可以侮辱你。</p></body></html>
