<p><small>回答：2023-12-26 13:48｜更新：2023-12-26 13:49｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/509649374/answer/3339024895">https://www.zhihu.com/question/509649374/answer/3339024895</a></small></p><hr><p data-pid="UyJMq7Un">因为不管是任何事物，人，乃至一切。</p><p data-pid="7TzyGH-W">都有喜欢的人，和厌恶的人。</p><p data-pid="4u0DuG5R">老想这些干嘛。</p><p data-pid="XC_fLeiq">爱玩玩，不玩滚。</p><p data-pid="KEl3LQ_L">另外，生活中，对个人来说，多想想有人不喜欢我，厌恶我时，心中默念“关我屁事”，可以保证心理健康。</p><p data-pid="buGRVygc">有一小部分人喜欢我，爱我，对这些人好点就完了。</p></body></html>
