<p><small>回答：2017-07-22 19:55｜更新：2017-10-12 10:44｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/51416619/answer/202154574">https://www.zhihu.com/question/51416619/answer/202154574</a></small></p><hr><p data-pid="svK3p5Xj">一面镜子，让抵制日货的中国人有多么愚蠢。</p><p data-pid="TP4acimE">贸易只会让我们变强，变强才是最好的抵制。</p><p><br></p><p data-pid="46y0ts17">认为抵制日货会让我们变强的，请找一本经济学教材学习，谢谢。</p><p><br></p><p data-pid="WqkPpEyY">如果日本入侵，我会用战斗来爱国，和平时期，我会用挣钱来爱国，可是我也喜欢日本车，这不矛盾。</p><p data-pid="K0Pav1al">不要用自己的愚蠢来爱国。</p></body></html>
