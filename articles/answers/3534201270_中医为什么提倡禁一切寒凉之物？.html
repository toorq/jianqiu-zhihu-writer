</style></head><body><h1>中医为什么提倡禁一切寒凉之物？</h1>
<p><small>回答：2024-06-18 12:44｜更新：2024-09-26 14:53｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/620680634/answer/3534201270">https://www.zhihu.com/question/620680634/answer/3534201270</a></small></p><hr><p data-pid="dhB-XYTF">简单说，活人是热的，死人是凉的。</p><p data-pid="c4FsZU6Y">这句话看不懂的就算了。</p><hr><p data-pid="XuFVncXb">这个问题本身是错误的，中医并没有禁止一切寒凉之物。</p><p data-pid="x11x27Zx">而是要根据每个人的体质做调整，中医本身用的中药很多就是寒凉的。</p><p data-pid="bmcpqXgN">比如一个人要是实火，就要用很多寒凉的药。</p><p data-pid="yuzfQxwM">我也就一个中医票友，看过两本粗浅的医书术。本着实事求是的原则，如果说的不对，轻喷。</p></body></html>
