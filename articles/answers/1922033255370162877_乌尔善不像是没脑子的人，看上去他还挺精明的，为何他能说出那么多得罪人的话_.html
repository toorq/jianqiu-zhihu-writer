<p><small>回答：2025-06-27 20:47｜更新：2025-06-27 20:47｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/662663486/answer/1922033255370162877">https://www.zhihu.com/question/662663486/answer/1922033255370162877</a></small></p><hr><p data-pid="zI9n67Fl">前置条件：</p><p data-pid="UgkLWz-e">条件 1）乌尔善不像是没脑子的人；</p><p data-pid="7nIeU06P">条件 2）看上去他还挺精明的；</p><p data-pid="ZiRXK5yP">条件 3）他能说出那么多得罪人的话。</p><p data-pid="0Av5wjhJ">结论显而易见：</p><p data-pid="u7oDFVUW">他是故意的，</p><p data-pid="DZFdlh9n">更进步一步，也许，我只是说也许：</p><p data-pid="TSjezQTx">他的任务就是恶心和得罪某些人。</p></body></html>
