<p><small>回答：2024-03-14 22:37｜更新：2024-03-14 23:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/648324029/answer/3430764068">https://www.zhihu.com/question/648324029/answer/3430764068</a></small></p><hr><p data-pid="uU8lUc0u">人家问你的儿子是不是美国国籍？</p><p data-pid="Xyxazs3n">就是网暴？</p><p data-pid="16kN-CfD">然后这位美国人的祖母，一位中国共产党人，享受了44年离休待遇后，拥有一位首富儿子的无产阶级斗士，在95岁高龄去世的所有罪过就是网友问她的孙子是不是中国人？</p><p data-pid="uyqjISov">这逻辑，我的CPU烧了。</p></body></html>
