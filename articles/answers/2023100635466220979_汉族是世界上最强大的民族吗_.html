<p><small>回答：2026-04-02 18:12｜更新：2026-04-03 20:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/656185595/answer/2023100635466220979">https://www.zhihu.com/question/656185595/answer/2023100635466220979</a></small></p><hr><p data-pid="46Vp0dQB">并不是。</p><p data-pid="RCM03VuF">虽然大家可以看我的过去的回答，我这人习练传武16年了，我是非常热爱中华文化，也是非常喜欢中华传统。</p><p data-pid="kHjQSW6g">但是，正是因为我喜欢，所以研究的深，我也知道我们中华文化是有一个bug。</p><p data-pid="USzkrzG6">就是教员说的：六朝往事，只为门户私记。</p><hr><p data-pid="s0wVE3-e">but，反者道之动，也许现在我们可以意识到这个问题，也是某种意义上的强大吧。</p></body></html>
