</style></head><body><h1>如何看待大人带小孩子来健身房？</h1>
<p><small>回答：2019-08-14 20:03｜更新：2019-08-14 20:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/31205453/answer/788470846">https://www.zhihu.com/question/31205453/answer/788470846</a></small></p><hr><p data-pid="TKqPoIX-">健身房不是很适合小孩子。</p><p data-pid="NAvPbHaE">其实我个人不太喜欢健身房，我觉得简单器械，囚徒健身这样的健身更自然。</p><p data-pid="--sBgRI0">健身房本身是一个商业化社会包装出来的消费主义的东西。</p></body></html>
