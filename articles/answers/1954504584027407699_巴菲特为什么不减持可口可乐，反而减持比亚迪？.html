<p><small>回答：2025-09-25 11:16｜更新：2025-09-25 11:16｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1901265288328110119/answer/1954504584027407699">https://www.zhihu.com/question/1901265288328110119/answer/1954504584027407699</a></small></p><hr><p data-pid="5jkoDpcw">和组织度，公司的好坏，行业都没关系。</p><p data-pid="RxX4SWVf">其实很简单，</p><p data-pid="suArtxvd">比亚迪是中国公司，是社会主义国家的公司，</p><p data-pid="Ce29tswX">可口可乐是美国公司，是资本主义国家的公司，</p><p data-pid="48ZBdgSH">而巴菲特是美国人。</p><p data-pid="35abACTc">站在巴老爷子的角度，钱已经挣到了，止盈很正常，</p><p data-pid="7CKwrXeE">政治风险也是他的角度要考虑的。</p></body></html>
