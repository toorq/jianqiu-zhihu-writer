</style></head><body><h1>为什么从锐捷网络离职？</h1>
<p><small>回答：2026-04-06 18:48｜更新：2026-04-06 18:48｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/36303325/answer/2024559075397050666">https://www.zhihu.com/question/36303325/answer/2024559075397050666</a></small></p><hr><p data-pid="9aM2LMOO">锐捷网络是我的第一份工作，对于老东家，我还是有不少感情的。</p><p data-pid="gqO0vrP7">我们锐捷技术还是做的很深的。</p><p data-pid="f_1Pgc2y">我07年到公司就开始写驱动，啃RFC和IEEE，后来第一个版的WIFI的AC+AP代码，也是我们当时就着RFC+IEEE+驱动文档（他们共同点就是又臭又长的英文）一行行手写出来的。</p><p data-pid="1d4zUFWC">这家公司真的有我很多的青春回忆。</p></body></html>
