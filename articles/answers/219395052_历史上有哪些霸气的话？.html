<p><small>回答：2017-08-24 00:03｜更新：2017-08-24 00:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/27360341/answer/219395052">https://www.zhihu.com/question/27360341/answer/219395052</a></small></p><hr><p data-pid="gEzSXQFm">韩信是有机会做皇帝的，可是他却说：</p><p data-pid="vdAC1e1m">“乘人之车者载人之患,衣人之衣者怀人之忧,食人之食者死人之事。”</p><p data-pid="6SPmWwGL">于是虽然他死了，他永远是那个布衣少年韩信，如他的名字一样。</p></body></html>
