<p><small>回答：2025-04-13 11:12｜更新：2025-04-13 11:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1892464153991574252/answer/1894709636155830305">https://www.zhihu.com/question/1892464153991574252/answer/1894709636155830305</a></small></p><hr><p data-pid="_Bw0zmEs">美国钱多（印的），货少；</p><p data-pid="TsvqvhhI">中国钱少，货多（生产的）。</p><p data-pid="URKswKxk">美国现在不买中国货了，</p><p data-pid="qVS40ZQB">美国人民可以吃绿纸过日子，中国人民可以吃卖不掉的货过日子，</p><p data-pid="YxYzUIN2">大家都有美好的未来。</p><p></p></body></html>
