<p><small>回答：2025-07-22 09:35｜更新：2025-07-22 09:35｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/342143917/answer/1930923930580936537">https://www.zhihu.com/question/342143917/answer/1930923930580936537</a></small></p><hr><p data-pid="cDCs8Jos">我个80后现在也不玩，</p><p data-pid="ZxKvIHpi">我本来就是休闲玩家，充了很多点卡，</p><p data-pid="KNnYsKHd">结果一段时间不玩上线发现我的点卡没了……</p><p data-pid="94BMROXf">因为全改月卡了，</p><p data-pid="ywIDodq7">真是烦人，也就是说你要是每个月就上线2天的休闲玩家，</p><p data-pid="MafYGWdb">就没资格玩魔兽世界。</p><p data-pid="g5rWxjPV">真是傲慢的游戏，傲慢的公司。</p></body></html>
