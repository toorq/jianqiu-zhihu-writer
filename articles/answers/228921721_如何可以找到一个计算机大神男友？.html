</style></head><body><h1>如何可以找到一个计算机大神男友？</h1>
<p><small>回答：2017-09-12 14:52｜更新：2017-09-12 14:52｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/64643308/answer/228921721">https://www.zhihu.com/question/64643308/answer/228921721</a></small></p><hr><p data-pid="QRfLYUMK">我过去过去还在安焦混的时候，<a class="member_mention" href="https://www.zhihu.com/people/7baaf3c00c2c7daeddf8e9ba813af141" data-hash="7baaf3c00c2c7daeddf8e9ba813af141" data-hovercard="p$b$7baaf3c00c2c7daeddf8e9ba813af141">@tombkeeper</a> 大神说过一个场景。</p><p data-pid="wuyNZONZ">一次Xcon会议，大牛们在技术交流之后最有兴趣的就是围着那次会议请来的礼仪小姐。</p><p data-pid="IxGUHkrk"><a class="member_mention" href="https://www.zhihu.com/people/7baaf3c00c2c7daeddf8e9ba813af141" data-hash="7baaf3c00c2c7daeddf8e9ba813af141" data-hovercard="p$b$7baaf3c00c2c7daeddf8e9ba813af141">@tombkeeper</a> 用的词是：那些大长腿姑娘们瞬间拿到了大神的大脑OS的root权限……</p><p data-pid="EMfzfDvO">So，姑娘，准备好的大胸脯和大长腿，去国内的各种线下技术论坛候着就可以了。</p><p></p><p></p><p></p></body></html>
