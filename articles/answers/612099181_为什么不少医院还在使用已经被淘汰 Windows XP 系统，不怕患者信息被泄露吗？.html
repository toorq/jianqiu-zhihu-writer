</style></head><body><h1>为什么不少医院还在使用已经被淘汰 Windows XP 系统，不怕患者信息被泄露吗？</h1>
<p><small>回答：2019-03-02 12:30｜更新：2019-03-02 12:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/314024154/answer/612099181">https://www.zhihu.com/question/314024154/answer/612099181</a></small></p><hr><p data-pid="zMSlPjQl">任何生产环境，企业环境，都是能用就行，能不升级就不升级。</p><p data-pid="kUj25ZgS">有些10~20年的老交换机，灰尘可以以厘米来计算，只要不坏，还是继续服役。</p><p data-pid="2kgyDAPQ">升级是要考虑投入产出比的，投入人力、金钱等资源换来不带来明显收益的项目，这样的决策，正常的领导都不会做。</p></body></html>
