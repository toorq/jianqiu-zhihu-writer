<p><small>回答：2018-09-12 10:05｜更新：2018-09-12 10:05｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/32072173/answer/489981429">https://www.zhihu.com/question/32072173/answer/489981429</a></small></p><hr><p data-pid="VoxCAw7j">新来的韭菜该割了，中国房价起飞也就是2000年以后，我老家的省会二线城市是在2004年以后。</p><p data-pid="WBqDVudf">90后没有经历过国家艰难的时候，没有见过大家不买房的时候，也没有大下岗的记忆，理所当然的认为，一切会一直向上。</p></body></html>
