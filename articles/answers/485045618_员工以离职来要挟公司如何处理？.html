</style></head><body><h1>员工以离职来要挟公司如何处理？</h1>
<p><small>回答：2018-09-04 11:28｜更新：2018-10-02 23:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/48674515/answer/485045618">https://www.zhihu.com/question/48674515/answer/485045618</a></small></p><hr><p data-pid="TPR-pESz">批准他离职。</p><p data-pid="jxkyqXmF">公司只要做保证自己在做正确的事情，应该不怕任何人离职。</p><p data-pid="6jFn8l-j">给员工加薪也是以为他的价值而不是以为谁要离职。</p></body></html>
