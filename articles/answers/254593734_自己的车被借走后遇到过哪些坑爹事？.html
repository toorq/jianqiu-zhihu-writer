</style></head><body><h1>自己的车被借走后遇到过哪些坑爹事？</h1>
<p><small>回答：2017-11-04 01:14｜更新：2017-11-04 01:14｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/52545263/answer/254593734">https://www.zhihu.com/question/52545263/answer/254593734</a></small></p><hr><p data-pid="8rARR6bg">很多年前，同事借我的第一辆车，高尔夫MK4去当婚车。</p><p data-pid="SLWp5tPe">跑了个长途，油加满了，很好。</p><p data-pid="ruQIwjqo">就是他的伴郎在我的车上，因为挡酒喝多了-吐了。同事很抱歉的和我说找洗车店洗过了哈....</p><p data-pid="MTH7qRXm">顶棚，脚垫上从此有了挥之不去的味道，后来自己掏钱做了全车大洗也没用。</p><p data-pid="VHY1gNbj">处女座的我只好把她卖了，至今还怀念这代经典的高尔夫。</p></body></html>
