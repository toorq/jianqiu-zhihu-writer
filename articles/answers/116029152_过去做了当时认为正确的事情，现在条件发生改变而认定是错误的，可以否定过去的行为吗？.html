</style></head><body><h1>过去做了当时认为正确的事情，现在条件发生改变而认定是错误的，可以否定过去的行为吗？</h1>
<p><small>回答：2016-08-10 13:40｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/47077383/answer/116029152">https://www.zhihu.com/question/47077383/answer/116029152</a></small></p><hr><p data-pid="t6oxhKc2">不需要，因为人对每一个问题的判断都是基于当时的环境和判断力来做的判断。</p><p data-pid="ub_wu3Xa">时空变了，条件不一样了，后悔实际上使用现在的环境和判断力来判断过去的事情，及无用，也无效。</p><p data-pid="_b4CUcsV">最佳的做法是就是就事论事的总结过去的经验教训，提高自身的判断力，用于下一个问题的判断。</p></body></html>
