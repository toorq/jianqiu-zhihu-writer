</style></head><body><h1>老板做的决定明显就是错误的，高管是顺从执行还是反对不执行？</h1>
<p><small>回答：2023-01-09 11:21｜更新：2023-01-09 11:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/546365572/answer/2836560578">https://www.zhihu.com/question/546365572/answer/2836560578</a></small></p><hr><p data-pid="Ldzw3ARQ">高管要看是否在决策层。</p><p data-pid="VGBRThM7">高管和中层管理者最大的不同是，高管是可以参与公司决策的。</p><p data-pid="31bFYe-M">不过如果老板已经决定了，那么坚决执行，因为要搞清楚，高管就是掌柜，公司毕竟是老板的。老板做错了，自然有市场惩罚他。</p></body></html>
