</style></head><body><h1>中国剑在现在被大多人认为是鸡肋或者是象征物，剑刺不如枪且难以劈砍，又不如刀棍易上手。剑赢人靠什么？</h1>
<p><small>回答：2014-11-04 15:06｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/26474742/answer/32909444">https://www.zhihu.com/question/26474742/answer/32909444</a></small></p><hr><p data-pid="wnjVKNkj">纯粹从武术角度说，剑这种武器想要用的好，本来就对使用者有很高要求，不是好入门的武器。可是正是因为这样才让剑这个武器多了很多象征意义的东西。</p><p data-pid="N10Mdrw7">那些武侠片里大多把剑当成棍子在乱砍，只能够呵呵了。</p></body></html>
