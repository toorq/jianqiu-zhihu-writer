<p><small>回答：2022-11-04 21:08｜更新：2022-11-04 21:08｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/470111226/answer/2744632680">https://www.zhihu.com/question/470111226/answer/2744632680</a></small></p><hr><p data-pid="G9lG7SYc">什么，你同情一个千亿级别的富豪？</p><p data-pid="RcgIsShm">1000亿，你知道什么概念么？</p><p data-pid="xbvGB54R">放在那边什么都不做，一年5%的利息，一年就是50亿。</p><p data-pid="X56OCZo-">一个打工仔一年存10w，需要5w个打工仔一起存钱，可能还不如人家一年利息多。</p><hr><p data-pid="94jSIHZQ">应该多想想的是，这样的资本，如果作恶，贫穷的你我能拿他怎么办。</p></body></html>
