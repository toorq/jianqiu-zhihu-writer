<p><small>回答：2025-12-29 08:16｜更新：2025-12-29 08:26｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1987683924999156785/answer/1988886024663892242">https://www.zhihu.com/question/1987683924999156785/answer/1988886024663892242</a></small></p><hr><p data-pid="cygqwYwP">有一年美国的胖子大量减少，因为美国上移了肥胖标准。</p><hr><p data-pid="Zc5QZwym">无法否定“斩杀线”，就重新定义“健康”。</p><hr><p data-pid="40zN434e">“冗余人口”，“有效出清”，这两词多么美妙，而血腥，多么“自由民主”的词呀。</p><p data-pid="DlSXiItn">再玩下去“自由民主”这词也要被重新定义了。</p><p></p></body></html>
