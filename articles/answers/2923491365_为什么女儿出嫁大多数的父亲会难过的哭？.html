</style></head><body><h1>为什么女儿出嫁大多数的父亲会难过的哭？</h1>
<p><small>回答：2023-03-06 11:19｜更新：2023-03-06 11:19｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/438149367/answer/2923491365">https://www.zhihu.com/question/438149367/answer/2923491365</a></small></p><hr><p data-pid="tfGsV7JP">父亲对女儿的感情很复杂，收线父亲和女儿是异性，第二父亲和女儿是血亲，第三父亲养育了女儿。</p><p data-pid="bR--ouET">郑渊洁说过一个很经典的话，大意是：</p><p data-pid="c1BCHWWn">女儿就好像自己父亲自己亲手种出来的果子，10年种树，10年施肥，10年防治病虫害……最好后不容易结出了美丽的果实，自己不能吃。别人吃了自己不甘心，要是别人不吃自己更着急。</p><p></p></body></html>
