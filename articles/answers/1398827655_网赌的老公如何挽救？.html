</style></head><body><h1>网赌的老公如何挽救？</h1>
<p><small>回答：2020-08-10 19:27｜更新：2020-08-10 19:27｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/398066844/answer/1398827655">https://www.zhihu.com/question/398066844/answer/1398827655</a></small></p><hr><p data-pid="kxE8bbRi">如果一个投资人要投资一个公司，专业一点的一定会对公司负责人进行背调。</p><p data-pid="0qCVS7Qq">如果负责人喜欢吃喝，是可以投的。喜欢嫖，也没问题。</p><p data-pid="Q_qCIOQb">可是如果一个公司负责人喜欢赌和毒，那是绝对不能投的。</p><p data-pid="pOV7tniE">那天他就可能拿着整个公司的钱（挪用公款）到澳门博一下。</p><p data-pid="O0ludvEQ">我遇到过赌博亏到破产自杀，改过自新的。可是真的很少……</p><p data-pid="fN26AgWd">So，人生在你自己手里，自己看着办吧。</p></body></html>
