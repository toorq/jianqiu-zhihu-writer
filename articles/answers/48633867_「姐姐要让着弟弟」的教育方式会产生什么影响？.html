</style></head><body><h1>「姐姐要让着弟弟」的教育方式会产生什么影响？</h1>
<p><small>回答：2015-05-22 16:59｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/30488401/answer/48633867">https://www.zhihu.com/question/30488401/answer/48633867</a></small></p><hr><p data-pid="ag8r_6cP">我有一个女儿，马上也要再添一个老二了，现在还不知道是男孩女孩。</p><p data-pid="HDBVZyCF">我的做法是：</p><p data-pid="_pTQd468">第一，我会让姐姐让着点弟弟，这是她作为兄长的一部分义务。比如以身作则，教弟弟一些东西，在共同活动的时候承担更多的一点责任等等。但是不会太过。</p><p data-pid="7FWaslEn">第二，我会给姐姐一些对应的权威。树立姐姐在弟弟面前的权威。如果只给责任不给权利，那就是明摆着欺负大的了。</p></body></html>
