</style></head><body><h1>袁崇焕到底该不该杀?</h1>
<p><small>回答：2025-12-29 11:20｜更新：2025-12-29 11:36｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/658574889/answer/1988932269293982024">https://www.zhihu.com/question/658574889/answer/1988932269293982024</a></small></p><hr><p data-pid="3YgPO4hf">明史研究越深，会越发现教员的《毛选》就是明末乱世的标准答案。</p><p data-pid="oIulkAwU">崇祯只有上井冈山，团结闯王代表的底层农民军，同时还有团结小地主，工人等一切可以团结的力量，</p><p data-pid="bmtjG-5K">才能清算内敌（包括权贵，江南财富，走势买办卖国集团等等），抵御外敌（关外地人等等）。</p></body></html>
