<p><small>回答：2024-04-03 11:40｜更新：2024-04-03 11:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/373447324/answer/3452990310">https://www.zhihu.com/question/373447324/answer/3452990310</a></small></p><hr><p data-pid="9e0pDh2j">因为排名是他爸爸国排的……</p><p data-pid="gekpjDng">而且历史上，北韩揍的南韩鼻青脸肿，北韩被老美揍的鼻青脸肿，老美被志愿军刚开始揍的鼻青脸肿，打到后面55开。</p><p data-pid="f3OQaiSe">所以一个实战垫底的战绩，关看爸爸国的排名有什么用。</p><p data-pid="b0H8iGP0">真正的排位赛还是要看真刀真枪打排位赛，不是一堆数值比来比去。</p><p data-pid="sOkvurcp">数值要是靠谱，全世界打战，大家互相拉一个xls就完了。</p></body></html>
