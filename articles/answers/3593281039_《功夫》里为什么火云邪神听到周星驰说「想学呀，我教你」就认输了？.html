</style></head><body><h1>《功夫》里为什么火云邪神听到周星驰说「想学呀，我教你」就认输了？</h1>
<p><small>回答：2024-08-13 17:46｜更新：2024-08-13 17:46｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/542063188/answer/3593281039">https://www.zhihu.com/question/542063188/answer/3593281039</a></small></p><hr><p data-pid="c1VQmsfR">用一句流行词说：阳谋无解。</p><p data-pid="SqrPkriZ">你知道对方怎么弄你的，对方就是告诉你怎么弄你的，可是你就是无解。</p><p data-pid="6HtJFAvW">教员的论持久战是公开发表的，蒋光头看，日本人也看，可是就是无解。</p></body></html>
