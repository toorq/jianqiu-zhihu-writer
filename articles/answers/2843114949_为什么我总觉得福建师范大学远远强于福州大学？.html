</style></head><body><h1>为什么我总觉得福建师范大学远远强于福州大学？</h1>
<p><small>回答：2023-01-13 10:49｜更新：2023-01-13 10:49｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/418634108/answer/2843114949">https://www.zhihu.com/question/418634108/answer/2843114949</a></small></p><hr><p data-pid="tFiXmwaL">普通人比的是学校。</p><p data-pid="iFduGg7z">牛人让学校拿来比。</p><p data-pid="VXJi6ZkS">转变下思维吧，找学校之前，多想想自己，哪个学校适合自己，自己的目标在哪里，学校如何让自己走的更远……</p><p data-pid="u4IRjZta">共和国印在钞票上的伟人当时可是换了很多学校，那些学校在当时也不见得多有名，可是他一直有上句所诉的思维。</p><p data-pid="wgCH2uOZ">哎，我年轻的时候要是有人和我说这些多好，当时没有知乎= =</p></body></html>
