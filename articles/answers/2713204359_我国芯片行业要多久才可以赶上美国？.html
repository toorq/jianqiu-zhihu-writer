<p><small>回答：2022-10-13 09:26｜更新：2022-10-13 09:26｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/403452621/answer/2713204359">https://www.zhihu.com/question/403452621/answer/2713204359</a></small></p><hr><p data-pid="5r90U81e">其实鹰酱现在的芯片封锁，短期是利空，长期对兔子的芯片产业肯定是利好。</p><p data-pid="IQNW14IT">很多人只看到人才，某某人多厉害，某某人在美国，已经获得了多么伟大的成就等等，这都是只看到问题的表面。</p><p data-pid="0V3CRB8V">资本主义最重要的是什么？是利润，是市场。</p><p data-pid="hCYKpNPi">芯片禁令等于主动让出市场，赌的是没有我鹰酱你兔子就是做不出来。</p><p data-pid="Y8ZMNQ0s">兔子说，谢谢呀，只要有利润，老子什么都干的出来。</p></body></html>
