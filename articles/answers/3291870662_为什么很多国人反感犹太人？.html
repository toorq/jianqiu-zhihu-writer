</style></head><body><h1>为什么很多国人反感犹太人？</h1>
<p><small>回答：2023-11-17 09:09｜更新：2023-11-17 09:09｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/625624216/answer/3291870662">https://www.zhihu.com/question/625624216/answer/3291870662</a></small></p><hr><p data-pid="JdbA4ZpF">我不讨厌犹太人，只是觉得犹太人的逻辑有点意思。</p><p data-pid="YcOByZQ6">你帮助犹太人，犹太人不觉得你帮助了他，因为是上帝安排你来帮助犹太人。</p><p data-pid="te1nd3Y_">犹太人在巴勒斯坦搞鸠占鹊巢，种族灭绝，在犹太人看来不是问题。</p><p data-pid="SjWa_1DA">因为，在犹太人看来这是上帝的旨意，是神经中安排的。</p><p data-pid="aK4v2tJB">那么二战犹太人被纳粹德国希德勒屠杀的时候，怎么不觉得这是上帝安排的，希德勒是上帝派来的使者呢。</p></body></html>
