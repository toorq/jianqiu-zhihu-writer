</style></head><body><h1>你如果缺钱了，会去KTV上班吗?</h1>
<p><small>回答：2022-12-15 13:45｜更新：2022-12-15 16:37｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/554433205/answer/2802366556">https://www.zhihu.com/question/554433205/answer/2802366556</a></small></p><hr><p data-pid="oGCpPwPF">不要，一旦吃了荤，人就臭了。</p><p data-pid="ck-QA-WZ">容易钱一挣，会影响人的价值观。</p><p data-pid="z9MuSc3c">年轻人硬实力固然很重要，可是更重要的是，你怎么看你自己，别人可以看一万种卑微的你，你不能把自己看成卑微的自己。</p><p data-pid="om6NhVGj">现在的中国，不是30年前的中国，勤奋点，多动动脑子，搞点钱还是不难的。</p><p data-pid="CNcM1IEx">而你的膝盖一旦跪下去了，想要再站起来，就不容易了。</p></body></html>
