</style></head><body><h1>怎么看国内总是自信的认为我国可以赢得对任何国家的竞争？</h1>
<p><small>回答：2025-11-24 09:47｜更新：2025-11-24 09:47｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1974868479350965336/answer/1976225470593909210">https://www.zhihu.com/question/1974868479350965336/answer/1976225470593909210</a></small></p><hr><p data-pid="hM3pAQYR">因为大多数人的自我认同是中国人，</p><p data-pid="Loqk_QVt">作为中国人，相信自己有什么错呢？</p><p data-pid="EAvV538_">有点自信有点什么错呢？</p><p data-pid="85KM3NyZ">作为一个人，你除了相信自己，难道去相信别人么？</p><p data-pid="2PXRnqPm">不相信自己的祖国，难道去相信远在西边的资本主义灯塔来拯救自己么？</p><hr><p data-pid="ilmY9DDQ">自信其实本身就是立场问题，根本不是什么逻辑问题。</p></body></html>
