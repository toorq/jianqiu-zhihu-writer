</style></head><body><h1>如何利用比特币赚钱？</h1>
<p><small>回答：2020-06-24 22:40｜更新：2020-06-26 11:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/22064342/answer/1300912984">https://www.zhihu.com/question/22064342/answer/1300912984</a></small></p><hr><p data-pid="5Jx8JQl-">作为一个比特币的老玩家，要说到怎么用比特币挣钱……那真是太多了。</p><p data-pid="zBMwwqMh">比特币天生是一个信任的机器，而最需要嫁接信任的，就是金融了。</p><p data-pid="cPrWGOZS">1）一级市场：挖矿（POW，POS），ICO等；</p><p data-pid="8q9XUe_2">2）二级市场：交易，买币投资等等；</p><p data-pid="9zJQja-Q">3）衍生品市场：期货，期权；</p><p data-pid="ehFSaoZy">4）比特币相关创业：搞项目，做服务，做挖矿设备，比特币媒体。</p><p></p></body></html>
