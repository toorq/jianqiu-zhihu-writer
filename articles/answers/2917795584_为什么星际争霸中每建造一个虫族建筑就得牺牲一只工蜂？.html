</style></head><body><h1>为什么星际争霸中每建造一个虫族建筑就得牺牲一只工蜂？</h1>
<p><small>回答：2023-03-02 12:18｜更新：2023-03-02 12:18｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/585920661/answer/2917795584">https://www.zhihu.com/question/585920661/answer/2917795584</a></small></p><hr><p data-pid="Usu4YnIU">其实你理解错了，虫族没有建造的概念，也没有建筑的概念。</p><p data-pid="EgKWNuko">每个虫族建筑都不是一个建筑，而是工蜂长成的，工蜂只是长成了你想要的样子。</p><p data-pid="0Ogo9EDB">所以虫族的建筑是会呼吸，会动的，受伤还会流血的。</p><p data-pid="xnJSyJqj">所以不要太悲伤，它们没有牺牲，它们只是成长了。</p><p data-pid="vqO4mxGZ">哈哈</p></body></html>
