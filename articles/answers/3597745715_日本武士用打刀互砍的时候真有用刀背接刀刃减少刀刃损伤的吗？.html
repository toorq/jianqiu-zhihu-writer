</style></head><body><h1>日本武士用打刀互砍的时候真有用刀背接刀刃减少刀刃损伤的吗？</h1>
<p><small>回答：2024-08-17 22:09｜更新：2024-10-06 11:58｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/466780843/answer/3597745715">https://www.zhihu.com/question/466780843/answer/3597745715</a></small></p><hr><p data-pid="mmT2O4Ds">日本刀怎么玩的？我不知道。</p><p data-pid="fHv2vqLR">在中国刀理，至少在我们门派玩的刀法里。</p><p data-pid="Q4Jya35Z">用刀刃接刀，纯属脑子有问题，水平不行。</p><p data-pid="bXDRDxGt">不懂得去读读南华经，养生主，庖丁解牛。这就是中国的道，中华的刀法的最高追求。</p><p data-pid="IeUTNAIz">不过追求是追求，真打起来，毕竟再好的刀就是个器物，砍坏了也就坏了。</p></body></html>
