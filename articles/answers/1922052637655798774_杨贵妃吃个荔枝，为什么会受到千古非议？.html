<p><small>回答：2025-06-27 22:04｜更新：2025-06-27 22:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/32267507/answer/1922052637655798774">https://www.zhihu.com/question/32267507/answer/1922052637655798774</a></small></p><hr><p data-pid="whCLImWM">呵呵，这只是一个隐喻。</p><p data-pid="QoOvGzAS">有人是在长安吃荔枝的人。</p><p data-pid="PlkVeelL">有人是为长安吃荔枝的人搞物流的人，这物流还不好做，需要技术创新和执行力。</p><p data-pid="KVqOZ0D-">有的人是种荔枝的人。</p><p data-pid="_viKLMx8">我们中国的文化就这个特点，很多小故事都说的特别隐晦，需要悟性。</p></body></html>
