</style></head><body><h1>如何看待 2020 年 5 月 21 日，北京突然白昼如夜、暴雨倾盆？</h1>
<p><small>回答：2020-05-22 12:02｜更新：2020-05-22 12:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/396332428/answer/1238558875">https://www.zhihu.com/question/396332428/answer/1238558875</a></small></p><hr><p data-pid="66R0k9L7">不奇怪，我作为一个福建人，在北京的时候，我就很奇怪暴雨天气，为什么一群北方人大呼小叫一惊一乍以为世界末日。</p><p data-pid="g_vXqyxh">福建每年台风来的时候，暴雨不要太多，下个几天几夜，街上能游泳的都有。</p><p></p></body></html>
