</style></head><body><h1>为什么我认为老外看起来每个人都很有个性，而中国人基本都差不多？</h1>
<p><small>回答：2022-12-16 14:31｜更新：2023-01-26 18:43｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/26542125/answer/2803857034">https://www.zhihu.com/question/26542125/answer/2803857034</a></small></p><hr><p data-pid="1s0Ludqq">因为普遍存在的认知偏差：</p><p data-pid="euU6mXIS">1.选择性认知：没有个性的老外你看不到。你要是通过媒体来了解中国人，你也会发现每个中国名人也都挺有个性的。</p><p data-pid="Wpi_CdsR">2.以偏概全：统计样本不够导致的认知偏差。你看的老外不够多，不具有统计学意义。</p></body></html>
