<p><small>回答：2020-05-14 14:05｜更新：2020-05-14 14:05｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/394245131/answer/1222070764">https://www.zhihu.com/question/394245131/answer/1222070764</a></small></p><hr><p data-pid="PhuInhXE">说明，您太太，对“圈子”和“关系”有很大的误解。</p><p data-pid="P_Iuukpy">不是因为你靠近了有钱人，你就是有钱人了。</p><p data-pid="-Bwr5fI2">也不是你靠近了权力，自己就拥有了权力。</p><p data-pid="TvuWxjFf">你好好琢磨一下以上两句话。</p></body></html>
