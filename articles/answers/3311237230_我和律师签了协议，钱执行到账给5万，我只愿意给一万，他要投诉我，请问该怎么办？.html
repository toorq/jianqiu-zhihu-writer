</style></head><body><h1>我和律师签了协议，钱执行到账给5万，我只愿意给一万，他要投诉我，请问该怎么办？</h1>
<p><small>回答：2023-12-03 08:01｜更新：2025-03-13 15:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/462949905/answer/3311237230">https://www.zhihu.com/question/462949905/answer/3311237230</a></small></p><hr><p data-pid="ykVoPMQl">你找律师维护你的契约，可是你却不愿意遵守对律师的契约。</p><p data-pid="13GLsvoX">原来你的契约精神是全世界都要守契约，</p><p data-pid="-kR6pkgq">可是你自己可以不守契约。</p><p data-pid="IEUxVeVV">这种情况你只好再取找个律师和原来的律所打官司，然后再承诺给他5万了。</p></body></html>
