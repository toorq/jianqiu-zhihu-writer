</style></head><body><h1>第一辆车应该买二手还是一手？</h1>
<p><small>回答：2015-06-20 12:38｜更新：2020-06-17 14:20｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/31203928/answer/52026560">https://www.zhihu.com/question/31203928/answer/52026560</a></small></p><hr><p data-pid="0U-ZrC83">可以买二手车，关键是不能买到问题车。</p><p data-pid="kD1Wa_2I">我的第一辆车就是二手车的高尔夫MK4，开了两年，然后卖掉。</p><p data-pid="lgIlRPbg">MK4代表了高尔夫第四代，是高尔夫最经典的一代之一，也是首次被引入国产的高尔夫次代。卖的一点都不亏，大概一年才贬值1w块钱。我很喜欢这辆车。</p><p data-pid="mEeXi6DQ">但是第二辆车我买了丰田，因为感谢第一辆大众车，让我学会了修车……</p></body></html>
