</style></head><body><h1>老婆觉得 500 块钱以上的路由器很贵，坚持买 200 以下的怎么办？</h1>
<p><small>回答：2023-02-03 20:09｜更新：2023-02-03 20:09｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/354084639/answer/2875030222">https://www.zhihu.com/question/354084639/answer/2875030222</a></small></p><hr><p data-pid="ibMUAzy9">不是理工科的女孩子，比如 <a class="member_mention" href="https://www.zhihu.com/people/967eac0a5a0780b7603da0051278abda" data-hash="967eac0a5a0780b7603da0051278abda" data-hovercard="p$b$967eac0a5a0780b7603da0051278abda">@陈大宝</a> 这样的，一波对路由器的CPU，内存，转发效率，响应延迟等没概念。</p><p data-pid="DM5c2Kb4">大多数人对路由器的理解还是看谁天线多谁好。</p><p data-pid="bfOnzsmd">我来回答这个问题，只是想吐槽下：</p><p data-pid="yg3E8AGe">你是混的多惨，就500块钱的路由器都要到之后上提个问题来问的。</p><p data-pid="SYUn57in">默默的买了吧= =</p></body></html>
