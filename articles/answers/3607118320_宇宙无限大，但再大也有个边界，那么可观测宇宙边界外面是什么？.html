</style></head><body><h1>宇宙无限大，但再大也有个边界，那么可观测宇宙边界外面是什么？</h1>
<p><small>回答：2024-08-27 06:59｜更新：2024-08-27 06:59｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/279533186/answer/3607118320">https://www.zhihu.com/question/279533186/answer/3607118320</a></small></p><hr><p data-pid="8HHGleOv">宇宙在膨胀，膨胀的速度是光速。</p><p data-pid="Upzfxpnn">目前已知，最大的速度是光速。</p><p data-pid="tpqVG2Rm">超过光速的方法可能是扭曲空间，空间打洞（虫洞）。</p><p data-pid="P7MKvHcn">宇宙外可能没有，打洞和扭曲空间应该用不了，所以，出不去。。。。</p></body></html>
