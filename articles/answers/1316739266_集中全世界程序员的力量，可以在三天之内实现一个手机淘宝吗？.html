<p><small>回答：2020-07-03 16:25｜更新：2020-07-03 19:54｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/396207596/answer/1316739266">https://www.zhihu.com/question/396207596/answer/1316739266</a></small></p><hr><p data-pid="Yfa43i7Q">不能。</p><p data-pid="NUVoWlS2">集中全世界女人的力量也不可能在3天内生出一个孩子。</p><p data-pid="9m9XP4VE">上面这个例子来之《人月神话》。</p><p data-pid="Xiq_HbHu">软件工程已经发展了几十年，计算机科学，是一门工程科学。要尊重基本事实，在谈一切。</p><p data-pid="5aIoqgJt">为什么程序员加班多，很多时候就是一个不懂行的领导整的。</p></body></html>
