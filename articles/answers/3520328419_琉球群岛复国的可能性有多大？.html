</style></head><body><h1>琉球群岛复国的可能性有多大？</h1>
<p><small>回答：2024-06-04 23:12｜更新：2024-06-04 23:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/655976590/answer/3520328419">https://www.zhihu.com/question/655976590/answer/3520328419</a></small></p><hr><p data-pid="5eEjAGWg">去琉球上旅游的时候会发现琉球人的坟墓跟福建人的非常非常像，回来一查，发现琉球人就是大量我福建人祖先的移民。</p><p data-pid="gOLgACsr">原来以为我国的第三艘航母叫福建号，是为了台湾准备的。</p><p data-pid="rgsP3G5f">现在我懂了，原来是为琉球准备的，毕竟和我们福建人有一样的祖先。</p><p data-pid="7ty35aPE">打台湾，那么近的地方，根本用不到航母。航母编队就是为了和对面漂亮国在太平洋上打决战准备的。</p></body></html>
