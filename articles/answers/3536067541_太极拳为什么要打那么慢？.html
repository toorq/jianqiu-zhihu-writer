</style></head><body><h1>太极拳为什么要打那么慢？</h1>
<p><small>回答：2024-06-20 07:48｜更新：2024-07-15 14:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/480753673/answer/3536067541">https://www.zhihu.com/question/480753673/answer/3536067541</a></small></p><hr><p data-pid="GKjGbr1i">我练的门派不是太极拳，只是南方一个小门派。</p><p data-pid="yhDGttYa">但是也属于内家拳，已经练了十几年，原先也只是觉得好玩，因为从小体弱多病开始入门。</p><p data-pid="4T5F9wv_">现在我练拳已经十几年了，我的身体在练拳后得到了极大的改善，形成了正循环，就慢慢的坚持下来。</p><p data-pid="pWl3wfPc">武术爱好者要感谢这个时代，这个帖子下面说的大多数内容过去都是收费课程，而且价格不菲，没那么好学到听到的。</p></body></html>
