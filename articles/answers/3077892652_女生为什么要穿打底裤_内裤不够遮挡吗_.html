</style></head><body><h1>女生为什么要穿打底裤?内裤不够遮挡吗?</h1>
<p><small>回答：2023-06-17 13:57｜更新：2023-07-18 07:57｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/600891641/answer/3077892652">https://www.zhihu.com/question/600891641/answer/3077892652</a></small></p><hr><p data-pid="U9iSwhrm">内裤和打底裤都是布料= =，的确是。</p><p data-pid="Wj7XAfKo">为什么一样是布料，穿裙子的内裤布料被人看到就好像是很严重的问题。</p><p data-pid="_8NfCnEF">穿泳装的时候，泳装内裤外穿的布料没问题……</p><p data-pid="MzUT8Ywh">无非就是一个商业化的洗脑罢了。不断地循环洗脑，</p><p data-pid="wcQt2Y4D">让部分男人觉得看到裙子下的布料很爽，让部分女人觉得裙子下的布料被看到很羞耻……好了，打底裤的市场出来了……</p></body></html>
