</style></head><body><h1>我和男朋友第一次去他家里见家长，可是到晚上睡觉的时候发现他妈只给我们准备了一间房，我该怎么办呢？</h1>
<p><small>回答：2020-08-09 00:46｜更新：2020-08-09 00:46｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/313802287/answer/1394775167">https://www.zhihu.com/question/313802287/answer/1394775167</a></small></p><hr><p data-pid="CBGHIXvo">家长在暗中已经发现了一切……</p><p data-pid="CcX6p2y_">恭喜你遇到了一个开明的可能的未来婆婆。</p><p data-pid="u63ZPnaF">你们要是还没同居，就好好的沟通下，提出来要另外一个房间。</p><p data-pid="0dEn8vfD">要是已经同居了……那就将就了吧，反正知道了就知道了，也没啥。都2020年了，男女平等。</p></body></html>
