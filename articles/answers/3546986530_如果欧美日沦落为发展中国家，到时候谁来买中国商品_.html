</style></head><body><h1>如果欧美日沦落为发展中国家，到时候谁来买中国商品?</h1>
<p><small>回答：2024-06-30 16:07｜更新：2024-06-30 16:08｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/660046812/answer/3546986530">https://www.zhihu.com/question/660046812/answer/3546986530</a></small></p><hr><p data-pid="nPrT-HL8">没关系，张三不买自然有李四来买，只要你的东西够买。</p><p data-pid="kZ6cqm2x">欧美日的人口加起来10亿左右。</p><p data-pid="-ZI2Cno9">全世界现在近80亿人，剩下的70亿人也是人，他们也想用好东西。</p><p data-pid="TAOJ44th">中国在一带一路国家，非洲国家长期的援助，修路修桥，就是让他们知道他们也是人，他们也可以靠自己勤劳致富，他们自己也可以买好东西。</p></body></html>
