</style></head><body><h1>世界上为什么会有乱伦的事情发生？</h1>
<p><small>回答：2026-03-05 14:13｜更新：2026-03-05 14:13｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1983136820540756448/answer/2012893396147124206">https://www.zhihu.com/question/1983136820540756448/answer/2012893396147124206</a></small></p><hr><p data-pid="9oej1p6D">因为乱伦的“伦”这个词，是我们中华文明特有的概念，</p><p data-pid="r50c-qvI">对就是儒家，孔子所谓的伦理纲常。</p><p data-pid="IFgNMWCr">是周礼的先进性。</p><p data-pid="mSSMtxHL">其它地方既然没有这个概念，自然也就没有乱伦了对吧。</p></body></html>
