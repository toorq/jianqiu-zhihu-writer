<p><small>回答：2022-11-30 23:06｜更新：2022-11-30 23:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/569595074/answer/2782134963">https://www.zhihu.com/question/569595074/answer/2782134963</a></small></p><hr><p data-pid="OToBNJmu">这一集剧本，可以收电锯人神作了。</p><p data-pid="RJaRyrec">主角，妥妥的主角光环</p><p data-pid="ByL0c1YU">之前有多喜欢这个角色</p><p data-pid="hiOe6P9c">死的时候突然，平静</p><p data-pid="hSYwztFN">没有一点拖泥带水，没有一点多余的对话</p><p data-pid="sw_tJtLA">我就是要把这个美丽的世界，不带一点犹豫的撕给你看</p><p data-pid="9CNhhBBX">然后</p><p data-pid="XZKcDazO">才知道，要斩断地狱不只是要勇气</p></body></html>
