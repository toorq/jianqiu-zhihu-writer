<p><small>回答：2020-03-17 09:42｜更新：2020-03-17 09:42｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/379688667/answer/1084194041">https://www.zhihu.com/question/379688667/answer/1084194041</a></small></p><hr><p data-pid="fdQkOYjE">肯定是先给接口再具体写算法，俗称“打桩”。</p><p data-pid="oGdWO3R2">好的工程师，做模块，定先做数据结构设计和接口设计，做完这两个，其他模块的人都可以往下推了。</p><p data-pid="O34DkQ9O">Eric Raymond说过，数据结构做好了，所有算法都不言而喻了。</p></body></html>
