</style></head><body><h1>一个人的教养如何体现？</h1>
<p><small>回答：2017-09-08 23:29｜更新：2017-09-08 23:29｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/26933347/answer/227352102">https://www.zhihu.com/question/26933347/answer/227352102</a></small></p><hr><ol><li data-pid="mNQ4oEuf">不在背后说人长短。在面前拍人马屁的人，必在背后说人长短。</li><li data-pid="jNUPzxk6">对地位低的人，依然克制温文尔雅。比如对仓管服务员。</li><li data-pid="EKJCRNzc">绝交不出恶意。</li><li data-pid="H2nhkbjR">君子之交淡如水，注意刻意保护朋友的安全距离。让对方舒适。</li><li data-pid="zrX09fNL">在以上所有温柔之后，却有一颗比谁更坚强的内心。</li></ol></body></html>
