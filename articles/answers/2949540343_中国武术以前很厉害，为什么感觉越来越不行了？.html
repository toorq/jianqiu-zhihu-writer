<p><small>回答：2023-03-23 12:01｜更新：2023-03-23 12:01｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/590500313/answer/2949540343">https://www.zhihu.com/question/590500313/answer/2949540343</a></small></p><hr><p data-pid="ygDTcBqN">说中国武术不厉害的大概是觉得我们祖先这么大的地盘都是靠讲道理充话费送的吧。</p><p data-pid="Omj4UIv3">也大概是觉得中国传统的武这个字，只是空手单打独斗挣点观众门票广告费赞助费的娱乐技术吧。</p><p data-pid="Vv8Vhs_C">真是好笑。</p></body></html>
