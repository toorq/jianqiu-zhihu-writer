</style></head><body><h1>天天嚷着要公平的人，是不是因为没体验过不公平带来的好处？</h1>
<p><small>回答：2015-10-27 16:10｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/36922252/answer/69601777">https://www.zhihu.com/question/36922252/answer/69601777</a></small></p><hr><p data-pid="pmcLo8f3">我记得多年前读过史密斯的一本经典，《中国人德行》，里面有评价中国人这种心态的话，至今记忆犹新。</p><p data-pid="niFN843L">大意：中国人抱怨不公平，就好像抱怨一场奢侈的宴席，他不是在抱怨宴席本身，而是在抱怨自己为什么没有坐在宴席的桌子上。</p><p data-pid="UE0dNODY">今天把这本书从书架上找了出来，2006年买的，书页已经范黄。推荐阅读。</p><figure><noscript><img src="https://pic1.zhimg.com/50/3660fa8ecaac651601cb2f53b72ce24e_720w.jpg?source=c8b7c179" data-rawheight="1440" data-rawwidth="1080" data-original-token="3660fa8ecaac651601cb2f53b72ce24e" class="origin_image zh-lightbox-thumb" width="1080" data-original="https://picx.zhimg.com/3660fa8ecaac651601cb2f53b72ce24e_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='1080'%20height='1440'&gt;&lt;/svg&gt;" data-rawheight="1440" data-rawwidth="1080" data-original-token="3660fa8ecaac651601cb2f53b72ce24e" class="origin_image zh-lightbox-thumb lazy" width="1080" data-original="https://picx.zhimg.com/3660fa8ecaac651601cb2f53b72ce24e_r.jpg?source=c8b7c179" data-actualsrc="https://pic1.zhimg.com/50/3660fa8ecaac651601cb2f53b72ce24e_720w.jpg?source=c8b7c179"></figure><br><br><br><figure><noscript><img src="https://pic1.zhimg.com/50/a0205b553a7e159bde6dbede0c4edfe7_720w.jpg?source=c8b7c179" data-rawheight="1440" data-rawwidth="1080" data-original-token="a0205b553a7e159bde6dbede0c4edfe7" class="origin_image zh-lightbox-thumb" width="1080" data-original="https://pic1.zhimg.com/a0205b553a7e159bde6dbede0c4edfe7_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='1080'%20height='1440'&gt;&lt;/svg&gt;" data-rawheight="1440" data-rawwidth="1080" data-original-token="a0205b553a7e159bde6dbede0c4edfe7" class="origin_image zh-lightbox-thumb lazy" width="1080" data-original="https://pic1.zhimg.com/a0205b553a7e159bde6
