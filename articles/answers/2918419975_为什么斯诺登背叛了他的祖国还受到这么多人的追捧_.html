</style></head><body><h1>为什么斯诺登背叛了他的祖国还受到这么多人的追捧?</h1>
<p><small>回答：2023-03-02 19:12｜更新：2023-03-09 13:57｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/578902346/answer/2918419975">https://www.zhihu.com/question/578902346/answer/2918419975</a></small></p><hr><p data-pid="C1iAEelM">他并没有背叛美国。</p><p data-pid="YgvhnoIz">他没有背叛美国建国时候的价值观。</p><p data-pid="jJBMAO7W">他只是抛弃腐朽的美国政府。</p><p data-pid="7mDM--PX">他只是站在了贪婪的美国资本对面。</p><hr><p data-pid="hWCcYdd2">请所有看到这里的大家，也要记得天安门城楼上的那两句话，</p><p data-pid="lT6ROfMK">只要共和国建国时候的价值观不变，</p><p data-pid="pRy94Jw2">共和国就永远不会亡。</p></body></html>
