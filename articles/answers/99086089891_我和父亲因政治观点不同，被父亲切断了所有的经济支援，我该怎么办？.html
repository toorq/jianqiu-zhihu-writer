</style></head><body><h1>我和父亲因政治观点不同，被父亲切断了所有的经济支援，我该怎么办？</h1>
<p><small>回答：2025-02-12 14:32｜更新：2025-02-12 14:32｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/622740854/answer/99086089891">https://www.zhihu.com/question/622740854/answer/99086089891</a></small></p><hr><p data-pid="QvuVigVZ">大家别那么热心了。</p><p data-pid="qyZNNPDm">这个行文浓浓的台湾腔，江西的兄弟行文完全不是这种嗲里嗲气的味道，别人不懂，我们福建人还不懂么。</p><p data-pid="s-zBILH-">写了半天无非是批判他父亲独裁不讲理，玩以大欺小的游戏，进而推而广之，到整个国家民族……</p><p data-pid="rE-qsOVi">下次作文写好点。</p></body></html>
