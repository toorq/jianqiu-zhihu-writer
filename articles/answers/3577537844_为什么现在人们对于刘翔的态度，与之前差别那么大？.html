<p><small>回答：2024-07-29 21:08｜更新：2024-07-29 21:08｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/661615214/answer/3577537844">https://www.zhihu.com/question/661615214/answer/3577537844</a></small></p><hr><p data-pid="UR70LA1j">当时中国的舆论环境和国民素质，还配不上这样一位耀眼的明星。</p><p data-pid="NlTQwDcC">经过这么多年，国家成长了，这个国家的每一个人也成长了，我们看待世界，看待西方，看待个人，看待英雄的方式都成长了。</p></body></html>
