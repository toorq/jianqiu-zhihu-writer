</style></head><body><h1>儿子沉迷游戏，与他讨论，他却说抽烟有害健康你还抽，该如何教育孩子？</h1>
<p><small>回答：2025-02-05 21:01｜更新：2025-02-05 21:01｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/477388387/answer/93578041607">https://www.zhihu.com/question/477388387/answer/93578041607</a></small></p><hr><p data-pid="6j709WnE">如果是我，我会说：</p><p data-pid="Dy-wZRDg">那好的，儿子，从现在开始，我们父子一起坐下来。</p><p data-pid="RmttG5NY">你戒游戏，我戒烟，我们父子俩一起上人生中重要的一课，战胜自己的欲望。</p><p data-pid="pwWmjAMw">我对孩子的教一直有一点，游戏可以玩，但是不能让游戏玩你。我自己也抽烟，也喝酒，但是从来没有烟瘾，酒瘾，我可以享受烟酒游戏，但是不能让它们来操纵我。</p></body></html>
