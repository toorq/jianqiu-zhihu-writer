</style></head><body><h1>如何在吵闹的寝室入睡？</h1>
<p><small>回答：2014-06-10 14:53｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/24078832/answer/26661430">https://www.zhihu.com/question/24078832/answer/26661430</a></small></p><hr><p data-pid="HUPc9JZP">我和你说两招：</p><p data-pid="7SaXZpXQ">1）出去学校附近租房子，适合家境比价好的，或者兼职收入稳定的。</p><p data-pid="kg3XG9DR">2）去班级里面找，找几个一样以为宿舍吵没法入睡的同学。然后一起到老师那里要求你们住在一起。并且拿出医院通知单，威胁老师不这样会抑郁，会神经衰落，会想自杀（当然不是真的），然后就成功了。</p></body></html>
