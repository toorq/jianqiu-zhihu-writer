</style></head><body><h1>如何看待 2020 年 3 月 23 日哔哩哔哩将稿件的「av 号」变更为「BV 号」？</h1>
<p><small>回答：2020-05-12 10:58｜更新：2020-05-12 10:58｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/381784377/answer/1217245855">https://www.zhihu.com/question/381784377/answer/1217245855</a></small></p><hr><p data-pid="TR15aVUv">av号，在程序设计上相当于一个index索引。</p><p data-pid="wuXuyZ1E">b站现在越做越大，原来的index不够用了，现在建一套新的index。</p><p data-pid="1KGUG7wV">这里的不够并不是指数字不够了，也是安全性效率等不够了。</p><p data-pid="iCCNvEPW">比如加一层Hash，就不太容易被人用爬虫怕全站视频。</p></body></html>
