<p><small>回答：2024-04-20 19:55｜更新：2024-04-20 19:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/569000157/answer/3472810969">https://www.zhihu.com/question/569000157/answer/3472810969</a></small></p><hr><p data-pid="GpgmG68Y">因为乌克兰，北约根本就打不赢。</p><p data-pid="mtfKrKSe">所以就泼脏水，搞恐怖袭击呗。</p><p data-pid="afjpD7Js">俄罗斯打赢了，人家战利品爱拿啥拿啥，别说洗衣机，就是压路机给扛回去，都可以。被盯着这些无聊的事情问为什么了，当然果然你领工资的当我没说。</p></body></html>
