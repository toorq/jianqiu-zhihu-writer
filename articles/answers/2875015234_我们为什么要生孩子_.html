</style></head><body><h1>我们为什么要生孩子?</h1>
<p><small>回答：2023-02-03 19:58｜更新：2023-02-03 19:59｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/349923819/answer/2875015234">https://www.zhihu.com/question/349923819/answer/2875015234</a></small></p><hr><p data-pid="UKJVjAIi">其实没什么，就是因为我们的肉体不过是DNA的船。</p><p data-pid="snFXxQ8Y">所有在个体的角度，社会的角度，患得患失的答案格局太低。</p><p data-pid="FiDIp9OK">我们的DNA里面写满了各种繁殖奖励的代码，因为没有这种奖励的代码，已经消失到历史中了。</p><p data-pid="AbewODrR">我们都是愿意生育的人类个体的后代。</p><p data-pid="2PbldHWv">而且一代一代的竞争中，这是”与”的逻辑，不是“或”的逻辑。</p></body></html>
