</style></head><body><h1>觉得《哪吒之魔童闹海》一点都不好看，但网上都在吹怎么回事？</h1>
<p><small>回答：2025-02-05 20:07｜更新：2025-02-05 20:08｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/11175110556/answer/93546371895">https://www.zhihu.com/question/11175110556/answer/93546371895</a></small></p><hr><p data-pid="RsLTqFLW">没关系，喜好看的观众并没有花你的钱。</p><p data-pid="EMn5xa1H">人家花得是自己的钱。</p><p data-pid="0TDeLufS">人家吹也是人家的自由不是。</p><p data-pid="jcerVE62">至于你为什么觉得不好看，我觉得应该问你自己，毕竟是你觉得。</p><hr><p data-pid="FrjK_7J6">人民群众，有人民群众自己的想法。</p><p data-pid="xTmx829p">不要觉得自己看的东西多，就可以代表人民群众。</p></body></html>
