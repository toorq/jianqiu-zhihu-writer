<p><small>回答：2020-05-21 13:45｜更新：2020-05-21 13:45｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/394771808/answer/1236653624">https://www.zhihu.com/question/394771808/answer/1236653624</a></small></p><hr><p data-pid="AqsbUy4W">看他的世界里面怎么定义垃圾了。</p><p data-pid="b_Iojfpk">有一种人，觉得自己穿着一身不上100元的衣服，穿着几十块的鞋子就自卑。</p><p data-pid="yQvUlyFa">也是同样的这种人，觉得穿一身名牌就非常非常有面子。</p><p data-pid="4CUnLQIy">我一直觉得，</p><p data-pid="A4BRPjk6">车子的真正意义是在路上。</p></body></html>
