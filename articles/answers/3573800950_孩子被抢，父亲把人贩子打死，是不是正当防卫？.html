<p><small>回答：2024-07-26 08:14｜更新：2024-07-26 08:14｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/425633815/answer/3573800950">https://www.zhihu.com/question/425633815/answer/3573800950</a></small></p><hr><p data-pid="2Ti5bbJV">下次见到这种情况，记得上去踢一脚，人多了，就不算了。</p><p data-pid="-BKfgZi5">别的地方不知道，福建南方农村里，可能算是你南蛮，普遍武德充沛，放在过去，进村偷东西都有可能被一人一脚踢死，更不用说人贩子了。</p></body></html>
