<p><small>回答：2025-03-01 18:00｜更新：2025-03-02 08:37｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/13694179060/answer/113686542236">https://www.zhihu.com/question/13694179060/answer/113686542236</a></small></p><hr><p data-pid="LQg0TDbK">真正的传武，耐力力量其实都练的，知识业务练和专业的训练时间上有区别。</p><p data-pid="UiJNnu-r">比如我要是真的练5小时以上，大活，第二天就感觉被掏空了囧，其它事情就不要干了。</p><p data-pid="g3B3jDhz">业余就是业余的，训练强度更不上，就算师父门派再好，也是不如职业的。</p><p data-pid="oXgi0bYe">毕竟人家职业的是吃这碗饭的。</p></body></html>
