</style></head><body><h1>哈马斯战败还有多远?</h1>
<p><small>回答：2024-05-31 23:23｜更新：2024-05-31 23:23｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/657756014/answer/3516407345">https://www.zhihu.com/question/657756014/answer/3516407345</a></small></p><hr><p data-pid="PGdafrx2">这问题问的，一看就是领工资的人提的。</p><p data-pid="L4x2PGdP">逊尼派这两天全在东大开会呢。</p><p data-pid="XpyC9aTD">嗅觉黎明灵敏的国家，巴西已经宣布永久撤出以色列大使馆了。土耳其也开始谴责以色列，并要求国际法庭调查以色列的种族灭绝罪行了。</p><p data-pid="o2dUZHC1">什叶派和逊尼派围攻鱿鱼，以色列唯一能保证不亡国的方案就是介绍东大提出的1967年两国方案。</p></body></html>
