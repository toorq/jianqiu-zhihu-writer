<p><small>回答：2026-03-05 08:30｜更新：2026-03-05 08:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2009582568111101181/answer/2012807194723247296">https://www.zhihu.com/question/2009582568111101181/answer/2012807194723247296</a></small></p><hr><p data-pid="8GvqjWLN">现在很多地方上已经形成了：</p><p data-pid="rSgIhqtK">1）物业公司由半黑道背景的老板建立。</p><p data-pid="sI_bbgsa">2）物业公司+小区部分有声望业主（还不是业委会）+街道社区 联合起来获取各种利益的局面。</p><p data-pid="AI6HpUfu">然后3方分肥。</p></body></html>
