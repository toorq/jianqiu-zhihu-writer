</style></head><body><h1>如何看待锤子科技坚果R1发布仅十天，就出现诸如摄像头磨花，边框间隙，溢胶，面板翘起，屏幕严重漏光问题？</h1>
<p><small>回答：2018-06-03 17:41｜更新：2018-06-03 17:41｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/278550579/answer/408439407">https://www.zhihu.com/question/278550579/answer/408439407</a></small></p><hr><p data-pid="JSyKbFzO">你只知道在深圳供应链圈子里，都说锤子的采购游水很足。说明锤子的公司供应链管理能力可能有所欠缺。</p><p data-pid="uAl1Ae9J">我那只怎么都修不好的M1L大概证明了这一点。</p><p data-pid="uUQ_PXkk">供应链管理是需要做很多苦活累活实在活的，和老板的风格可能有关系。做手机、汽车、制造业的老板，都需要是个实在人。</p></body></html>
