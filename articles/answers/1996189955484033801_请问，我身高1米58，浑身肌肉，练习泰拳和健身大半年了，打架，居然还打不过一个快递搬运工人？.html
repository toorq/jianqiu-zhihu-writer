</style></head><body><h1>请问，我身高1米58，浑身肌肉，练习泰拳和健身大半年了，打架，居然还打不过一个快递搬运工人？</h1>
<p><small>回答：2026-01-18 11:59｜更新：2026-02-05 14:44｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1900978855906359116/answer/1996189955484033801">https://www.zhihu.com/question/1900978855906359116/answer/1996189955484033801</a></small></p><hr><p data-pid="zJGFQL-i">人家一天重体力活可能干的远不止 8 小时。</p><p data-pid="47TJG4lx">问为什么？就是为了生活。</p><p data-pid="_iyJoFli">大家可能不知道 8 小时的重体力劳动代表了什么。</p><p data-pid="7ybaMgFF">你每天练 8 小时吗？</p><p data-pid="nrJ1Msff">不要用这种居高临下的眼光去看劳动人民。</p></body></html>
