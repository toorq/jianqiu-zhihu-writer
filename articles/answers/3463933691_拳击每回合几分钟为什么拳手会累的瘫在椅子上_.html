</style></head><body><h1>拳击每回合几分钟为什么拳手会累的瘫在椅子上?</h1>
<p><small>回答：2024-04-12 21:59｜更新：2024-04-22 07:27｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/350355998/answer/3463933691">https://www.zhihu.com/question/350355998/answer/3463933691</a></small></p><hr><p data-pid="0LTjs8eO">你别说拳击，你去扎马步。</p><p data-pid="69uLPBPQ">就最简单的四平大马，标准动作。</p><p data-pid="E6i4vPno">能超过3分钟，你已经打败了90%以上的人。</p><p data-pid="Q_2RjLIe">超过5分钟，你已经打败了99%以上的人。</p><p data-pid="rNP6t9ro">大多数没有训练过的人，连30秒都做不到。</p></body></html>
