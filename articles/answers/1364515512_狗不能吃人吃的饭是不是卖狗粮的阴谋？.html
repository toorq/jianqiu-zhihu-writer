</style></head><body><h1>狗不能吃人吃的饭是不是卖狗粮的阴谋？</h1>
<p><small>回答：2020-07-27 14:02｜更新：2020-07-27 14:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/306919987/answer/1364515512">https://www.zhihu.com/question/306919987/answer/1364515512</a></small></p><hr><p data-pid="deyzHn9-">是也不是，要看品种。</p><p data-pid="kFpSgIgi">土狗（中华田园犬）是以为人吃什么他们吃什么，百代遗传赛选下来，不适应人吃什么他吃什么的狗被淘汰了。</p><p data-pid="-YE1TH00">现代的其他狗品种在配种选择的时候，没有经过这样的选择。所以，需要定制的狗粮来适应狗。</p></body></html>
