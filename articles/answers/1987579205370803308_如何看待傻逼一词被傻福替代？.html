</style></head><body><h1>如何看待傻逼一词被傻福替代？</h1>
<p><small>回答：2025-12-25 17:43｜更新：2025-12-25 17:43｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1982547866527499013/answer/1987579205370803308">https://www.zhihu.com/question/1982547866527499013/answer/1987579205370803308</a></small></p><hr><p data-pid="31N3fd6Y">想想后人翻阅2025人类的“数字遗产”，发现原来那个年代的人，</p><p data-pid="-8KoFr_X">把某饮品，称为8+1；</p><p data-pid="9TMAp4-d">把某毒害物，称为强化剂……</p><p data-pid="OcW--xto">我其实一直看不懂这些不明所以的关键字，在知乎也是，写东西必须想想自己什么字犯了忌讳，</p><p data-pid="JRF5MIxk">而且这个忌讳字也不明确告诉你什么不能说，什么应该代称，只能自己对着被违规之后去领悟……</p><p></p><p></p></body></html>
