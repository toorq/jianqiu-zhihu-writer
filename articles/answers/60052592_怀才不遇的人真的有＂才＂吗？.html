</style></head><body><h1>怀才不遇的人真的有＂才＂吗？</h1>
<p><small>回答：2015-08-20 15:03｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/21664623/answer/60052592">https://www.zhihu.com/question/21664623/answer/60052592</a></small></p><hr><p data-pid="-FlR20LN">有的人有，有的人没有，不能一棍子打死。</p><p data-pid="MbaQUOQ3">什么东西绝对的去说，就不符合易经的思想。</p><p data-pid="sQzabOea">用命理学去解释，有的人八字好，可是运气一辈子都不好。有的人看似有才，实际无才，运气又不好。都有可能，反之亦然。</p></body></html>
