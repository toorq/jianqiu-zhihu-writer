<p><small>回答：2016-05-16 14:11｜更新：2017-09-08 00:44｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/46343213/answer/101119870">https://www.zhihu.com/question/46343213/answer/101119870</a></small></p><hr><p data-pid="WpkVdSfO">我推荐咏春，咏春拳本来传说就是由女侠发明的，马步比较适合女生，打法也比较克制长拳。</p><p data-pid="BFTYVWkx">而且咏春讲究走直线，贴身短打，也比较适合女孩子。</p><p data-pid="JvNDpzQP">因为咏春讲直线，有很多抢攻手法，所以能过实战的速度比太极快。</p><p data-pid="B1tddM13">非咏春拳门人……以上只是我自己对咏春拳架的理解。</p></body></html>
