<p><small>回答：2022-12-22 12:50｜更新：2022-12-22 12:51｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/552287761/answer/2811564032">https://www.zhihu.com/question/552287761/answer/2811564032</a></small></p><hr><p data-pid="PMyRDR8n">大概看了一下这个问题，同意这位同学的答案</p><a href="https://www.zhihu.com/question/552287761/answer/2668132681" data-draft-node="block" data-draft-type="link-card" class="internal">爷爷和我争爸爸留下的遗产，我该怎么办？</a><p data-pid="UNr9C821">从事实的角度来说，如何分钱，没有什么好问的，有遗嘱按遗嘱办，没有遗嘱按继承法办。</p><p data-pid="4yL0Zbot">从道德的角度来说，你还年轻，有盈利的能力，多给老人留点也没啥。真正顶天立地的男儿应该把眼睛放在江河之水中，而不是手里端着的碗里的水中。</p></body></html>
