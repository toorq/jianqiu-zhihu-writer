<p><small>回答：2020-05-19 17:44｜更新：2023-01-08 08:13｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/381142413/answer/1232932445">https://www.zhihu.com/question/381142413/answer/1232932445</a></small></p><hr><p data-pid="jUI48XdW">假如我和你上午吵了架，下午我拿把菜刀，跑到你加门口磨菜刀。</p><p data-pid="uTwW3zwX">顺便扎了个稻草人，再用我磨好的快刀，用上我祖传的刀法把稻草人切成一片片的……</p><p data-pid="OwMr-Zhr">在你家门口磨菜刀犯法吗？</p><p data-pid="4l7yuxWT">好像不犯法，可是你应该会觉得不是很舒服……</p></body></html>
