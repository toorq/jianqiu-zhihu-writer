<p><small>回答：2019-12-11 10:50｜更新：2019-12-11 10:50｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/358469980/answer/931008994">https://www.zhihu.com/question/358469980/answer/931008994</a></small></p><hr><p data-pid="nDrg094G">刚巧这两款本子我都有，分别是</p><p data-pid="5UQZJ3mv">2017款X1C：i7顶配的CPU+16G内存+1Tssd</p><p data-pid="nXOb-_eM">T480：i7的CPU+16G内存+1Tssd</p><p><br></p><p data-pid="EiTx7Lbm">总体感觉</p><p data-pid="BtGYVWXr">x1c外观和屏幕上好一点，可是CPU不如t480，跑多了东西就比较慢。</p><p data-pid="Tap4lfsc">t480重量比较重，可是cpu给力很多。</p><p></p></body></html>
