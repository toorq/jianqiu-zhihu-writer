</style></head><body><h1>如何评价梁宏达言论「汉服在二次元上搞不过旗袍，旗袍有街霸春丽、海贼王女帝、银魂神乐等等，汉服有谁」？</h1>
<p><small>回答：2025-12-30 09:28｜更新：2025-12-30 09:28｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1948909149137137727/answer/1989266480680940522">https://www.zhihu.com/question/1948909149137137727/answer/1989266480680940522</a></small></p><hr><p data-pid="9RufjPWV">还好凡人修仙传，大家穿的都是汉服……</p><p data-pid="nCJh0O3w">哦，对。</p><p data-pid="vdgI1S1u">旗袍所谓街霸春丽、海贼王女帝、银魂神乐……</p><p data-pid="YFipKnCn">那种漏半个胸，旗袍开叉恨不得到腰的衣服，正经女孩子家谁穿这个呀。</p><p data-pid="193QpReR">你不觉得小日本在动漫里这么整旗袍，是在变着花样侮辱你（中华）么？</p></body></html>
