</style></head><body><h1>泽连斯基联大演讲：没有中国，普京的俄罗斯什么都不是，如何看待这一说法？</h1>
<p><small>回答：2025-11-12 13:56｜更新：2025-11-12 13:56｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1954315992609039918/answer/1971939514554495208">https://www.zhihu.com/question/1954315992609039918/answer/1971939514554495208</a></small></p><hr><p data-pid="52bOKN0E">好割裂，</p><p data-pid="za0re8EW">在知乎上行不是动不动，</p><p data-pid="mqROmh4W">中国人工业不行，历史不行，中医不行，传统武术不行，人种不行，文化不行……</p><p data-pid="gwzyUaB8">所以，我信知乎，泽连斯基说的都是假的。</p><p data-pid="Ha8l93iK">乌克兰就是没有北约，没有老美，也可以屹立于世界之林。</p></body></html>
