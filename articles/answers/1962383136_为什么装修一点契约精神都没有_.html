</style></head><body><h1>为什么装修一点契约精神都没有?</h1>
<p><small>回答：2021-06-26 14:41｜更新：2021-06-26 14:41｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/431579942/answer/1962383136">https://www.zhihu.com/question/431579942/answer/1962383136</a></small></p><hr><p data-pid="3oOmdWb4">当契约对自己有利的时候，就提倡契约精神。</p><p data-pid="crs8DaCY">当契约对自己不利的时候，就装作不知道什么是契约精神。</p><p data-pid="i0HgzLGX">这是社会常态，年轻人早日适应。</p></body></html>
