</style></head><body><h1>马上 2025 年了，你认为 256G 存储手机在 2025 年还够用吗？</h1>
<p><small>回答：2024-12-27 14:49｜更新：2024-12-27 14:49｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/7636983556/answer/65333056442">https://www.zhihu.com/question/7636983556/answer/65333056442</a></small></p><hr><p data-pid="XR2AaxFF">够用，一款手机用2~3年最多，我多花大几百买存储，真的不如每个月多花几块钱买云存储。</p><p data-pid="FssoV6f3">在网速如此快，的今天，云存储完全可以replace掉大多数本地存储。</p><p data-pid="40KKBQsW">看看云绝区零就知道了，在如此快的速度下，local的性能以后性价比会越来越低。</p></body></html>
