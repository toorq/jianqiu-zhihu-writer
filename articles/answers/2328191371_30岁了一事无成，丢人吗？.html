<p><small>回答：2022-01-28 15:49｜更新：2022-01-28 15:49｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/439543219/answer/2328191371">https://www.zhihu.com/question/439543219/answer/2328191371</a></small></p><hr><p data-pid="BPlXpao6">不丢，人最终，还是要为自己而活。</p><p data-pid="zxq0ck2x">在一定年龄，获得一定的世俗的成就，不来就是一个问号。</p><p data-pid="KAZj7g0q">而放到一些很有成就的人身上，也常常有到了很大年龄的人，才出成就的，比如任正非。</p></body></html>
