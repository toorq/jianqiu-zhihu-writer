<p><small>回答：2025-12-28 22:08｜更新：2025-12-28 22:22｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/551883155/answer/1988733051329615537">https://www.zhihu.com/question/551883155/answer/1988733051329615537</a></small></p><hr><p data-pid="hsbdZZcC">我记得很清楚，在西方灌输给我们的历史课本上，</p><p data-pid="1poCxOY5">西方突然想起来我祖上阔过，</p><p data-pid="6zMNT3Sh">想起来希腊的先哲，罗马的荣光 ，</p><p data-pid="q1r9FUyG">然后就变强变牛逼了……</p><p data-pid="4XamwKHz">这个倒车还有个好听的名字 ，</p><p data-pid="6fq9jZUr">启蒙运动，文艺复兴，</p><p data-pid="OO2aaRWZ">可见开点倒车有利于加速，</p><p data-pid="LSu6-Ppc">这可是西方的先进经验呀</p></body></html>
