</style></head><body><h1>为什么都说「土到极致就是潮」？有哪些土成功的例子？</h1>
<p><small>回答：2022-07-14 15:40｜更新：2022-07-14 15:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/295264922/answer/2574189794">https://www.zhihu.com/question/295264922/answer/2574189794</a></small></p><hr><p data-pid="YfB_oayY">要好好理解下“我蛮夷也，不与中国之号谥”的精神</p><p data-pid="QuNla9CA">就是不管你是什么样的形式</p><p data-pid="Zhy8ie2M">只要你不觉得尴尬，表现的是自信，然后你刚好又比较强大</p><p data-pid="k2oMi0K5">就会潮了</p><p data-pid="zKd5j-Is">潮其实本质是一种强者崇拜和对强者的模仿</p><p data-pid="ermPS8xu">所以时尚行业就是不断的给这个本质换上包装</p><p data-pid="d-iVzVSw">可是大多数蠢人就只看到这个包装而已</p></body></html>
