</style></head><body><h1>李子柒和华农兄弟哪个是真实的农村生活？</h1>
<p><small>回答：2020-01-27 13:54｜更新：2020-01-27 13:54｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/295755562/answer/986928816">https://www.zhihu.com/question/295755562/answer/986928816</a></small></p><hr><p data-pid="wFqD4UDk">李子柒和华农兄弟两位我都很喜欢，因为我心里比较向往田园生活。</p><p data-pid="yQZ27iB6">李子柒的农村生活肯定不是真实的，她时田园的诗，真实不重要，美的梦幻。</p><p data-pid="ZHciXalh">华农兄弟贵在真实，他们是农村的记叙文，真实的美，美的很实在。</p><p data-pid="4ZOvATTX">希望文学的小伙伴体会过，</p><p data-pid="0RVDtOo6">记叙文有记叙文的美，平铺直叙有平铺直叙的感人。</p><p data-pid="YLjUYyTy">诗歌有诗歌的美，想象跳跃，如梦如画有如梦如画的美。</p></body></html>
