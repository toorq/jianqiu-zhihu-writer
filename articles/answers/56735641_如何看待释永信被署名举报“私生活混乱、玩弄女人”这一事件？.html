</style></head><body><h1>如何看待释永信被署名举报“私生活混乱、玩弄女人”这一事件？</h1>
<p><small>回答：2015-07-28 10:33｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/33491400/answer/56735641">https://www.zhihu.com/question/33491400/answer/56735641</a></small></p><hr><p data-pid="ASH5pe6C">去过少林旅游一次，和多位当地人聊过，大和尚的口碑貌似还行。</p><p data-pid="VWMIkvhP">那次旅行的下午，见到少林寺抚养的几十位孤儿，排好队，全部到方丈的房间内去。</p><p data-pid="2gtUmfhO">至于释永信胖，大家听过瘦道士，胖和尚么。心宽才能体胖好不好。</p><p data-pid="_g4tvGZr">少林寺边上的少林药局不知道和少林寺什么关系，还是有卖药的。</p><figure><noscript><img src="https://picx.zhimg.com/50/aedd55b1c00acad74f3d2c1ceb42caf3_720w.jpg?source=c8b7c179" data-rawwidth="400" data-rawheight="300" data-original-token="aedd55b1c00acad74f3d2c1ceb42caf3" class="content_image" width="400"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='400'%20height='300'&gt;&lt;/svg&gt;" data-rawwidth="400" data-rawheight="300" data-original-token="aedd55b1c00acad74f3d2c1ceb42caf3" class="content_image lazy" width="400" data-actualsrc="https://picx.zhimg.com/50/aedd55b1c00acad74f3d2c1ceb42caf3_720w.jpg?source=c8b7c179"></figure><br><br><br><figure><noscript><img src="https://pica.zhimg.com/50/eb004077b5abf6a505b3c633c082368b_720w.jpg?source=c8b7c179" data-rawwidth="400" data-rawheight="533" data-original-token="eb004077b5abf6a505b3c633c082368b" class="content_image" width="400"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='400'%20height='533'&gt;&lt;/svg&gt;" data-rawwidth="400" data-rawheight="533" data-original-token="eb004077b5abf6a505b3c633c082368b" class="content_image lazy" width="400" data-actualsrc="https://pica.zhimg.com/50/eb004077b5abf6a505b3c633c082368b_720w.jpg?source=c8b7c179"></figure></body></html>
