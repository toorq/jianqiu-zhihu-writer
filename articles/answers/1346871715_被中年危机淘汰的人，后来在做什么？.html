</style></head><body><h1>被中年危机淘汰的人，后来在做什么？</h1>
<p><small>回答：2020-07-18 23:55｜更新：2020-07-18 23:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/395768221/answer/1346871715">https://www.zhihu.com/question/395768221/answer/1346871715</a></small></p><hr><p data-pid="wBMVpAaQ">活着！或者死去。</p><p data-pid="ksS6kSTA">我一直觉得中年危机是个社会发明。</p><p data-pid="9v5eEJHB">5岁，应该干什么；</p><p data-pid="vXsu9DKc">10岁，应该干什么；</p><p data-pid="gdx7w-hl">20岁，应该干什么；</p><p data-pid="BMCbrulR">25，30，40岁……</p><p data-pid="d2QEV4c9">谁规定的？社会的枷锁，消费主义的陷阱，看开了就没有危机了。</p><p data-pid="xCov1DwP">比如说我，眼看快40了。</p><p data-pid="a6vPdzP2">找工作，估计是找不到了，只能一直创业一直创业一直糊弄下去了。</p></body></html>
