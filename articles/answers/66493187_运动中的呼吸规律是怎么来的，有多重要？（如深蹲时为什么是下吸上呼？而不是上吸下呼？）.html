</style></head><body><h1>运动中的呼吸规律是怎么来的，有多重要？（如深蹲时为什么是下吸上呼？而不是上吸下呼？）</h1>
<p><small>回答：2015-10-06 11:35｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/21657682/answer/66493187">https://www.zhihu.com/question/21657682/answer/66493187</a></small></p><hr><p data-pid="PmOlleKI">从武术的角度来说，发力的时候吐气更有利，更舒服。船夫嘿哟嘿哟拉的时候，也是在吐气发力。</p><p data-pid="nnxVck6y">但是却要练到吸气吐气都要能够发力。总不能改打的时候，要等吸一口气再打吧。</p><p data-pid="Qyfe9ILH">就普通人来说，下蹲肯定不起来省力，起来的时候吐气更舒服。如果要练的话，起来的时候吸气也没什么不可以。</p></body></html>
