<p><small>回答：2026-01-04 08:44｜更新：2026-01-04 09:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/1989850200534179851/answer/1991067558225396251">https://www.zhihu.com/question/1989850200534179851/answer/1991067558225396251</a></small></p><hr><p data-pid="oEVDNwv5">章北海我关注的他其实很早。</p><p data-pid="Jfmk8Geq">他早期说自己是业余做自媒体，主要聊自己创业的商业故事。</p><p data-pid="OSzC3Yq_">到最近开始大篇幅的聊小日子厨师的朝鲜故事，各种花式黑朝鲜开始，我就感觉不对了。</p><p data-pid="BNgRo5UF">这次斩杀线问题，真的是把他屁股漏出来了。</p></body></html>
