<p><small>回答：2020-05-19 17:56｜更新：2020-05-19 17:56｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/390648608/answer/1232956322">https://www.zhihu.com/question/390648608/answer/1232956322</a></small></p><hr><p data-pid="E1tclmtW">看看银行贷款的利率，现在是基本年化在5%左右。</p><p data-pid="VkIdkcFA">如果你拿着贷款的钱，比如一百万，一年能挣的钱超过这个数字就贷款。</p><p data-pid="NPJKmvyn">如果你超不过，就全款。</p><p data-pid="uQG3iSe3">就这样，特别简单。</p></body></html>
