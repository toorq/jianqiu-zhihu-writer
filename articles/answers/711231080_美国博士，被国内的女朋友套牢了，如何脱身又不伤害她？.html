<p><small>回答：2019-06-10 22:04｜更新：2019-06-10 22:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/327305525/answer/711231080">https://www.zhihu.com/question/327305525/answer/711231080</a></small></p><hr><p data-pid="wQHSLY_e">“用过”这两个字彻底恶心到我了。</p><p data-pid="j58GZDgu">我的朋友圈里，有些人养小三，弄个房子给金丝雀，每个月再打个最少2w，然后才能叫做去用。</p><p data-pid="C9P4C0cb">你当时个穷学生，何德何能，谈”用过“。</p><p data-pid="n0cFxckn">真是恶心。</p><p data-pid="qhywMRvg">你的书算是百读了，培养了一个如此精致的利己主义者。</p></body></html>
