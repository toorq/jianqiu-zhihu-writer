<p><small>回答：2020-07-06 01:05｜更新：2020-07-06 01:05｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/404531863/answer/1321118508">https://www.zhihu.com/question/404531863/answer/1321118508</a></small></p><hr><p data-pid="jk4BVZmg">中国总算真的强大起来了，80后的我，最经常的记忆就是，</p><p data-pid="IYPSBKhG">抵制日货，抵制美货，</p><p data-pid="8aUEtVX6">支持国货。</p><p data-pid="gJF4DsYk">福州鼓山上现在还有民国时候留下的“国货救国”四字血泪摩崖石刻。</p><p data-pid="TRgN1dXR">总算，你们也轮到了这一天。</p><p data-pid="6V05pguC">大家放心，一个产业链，规模化的生产一旦形成，</p><p data-pid="RJ00PIBE">很难靠抵制干下去，</p><p data-pid="Qvm5ojJX">只能让被抵制的东西越来越强。</p></body></html>
