</style></head><body><h1>为什么很多人孩子那么丑，还总在朋友圈发出来晒？他们不觉得孩子丑吗？</h1>
<p><small>回答：2023-11-26 17:07｜更新：2023-11-26 17:07｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/53030305/answer/3303171124">https://www.zhihu.com/question/53030305/answer/3303171124</a></small></p><hr><p data-pid="pkn1uYRp">你觉得人家孩子好看还是丑是你的自有。</p><p data-pid="TeNpSzaf">人家觉得自己孩子宝贝漂亮全天下第一最美就是他（她）也是人家的自由。</p><p data-pid="i_u18SOt">你不想看，可以屏蔽朋友圈，也可以删微信，这也是你的自由。</p></body></html>
