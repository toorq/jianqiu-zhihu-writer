<p><small>回答：2024-11-22 07:02｜更新：2025-03-01 06:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/4669127183/answer/37587479304">https://www.zhihu.com/question/4669127183/answer/37587479304</a></small></p><hr><p data-pid="-VWWZsf1">翻译一下就是：</p><p data-pid="PXf3qMqJ">“我儿子是美国籍，可是这是我家的自由，你们管不着。</p><p data-pid="d6pwGGTQ">我的员工都是中国人，我在中国挣钱，你们也管不着。</p><p data-pid="pfV1qEE3">至于这个挣来的钱是谁的，在哪里花，你们就更管不着了。”</p><hr><p data-pid="QwtKZsIT">好了，我们消费者也有选择产品的自由。</p></body></html>
