<p><small>回答：2017-08-25 00:39｜更新：2017-08-25 12:29｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/63867543/answer/220000216">https://www.zhihu.com/question/63867543/answer/220000216</a></small></p><hr><p data-pid="6CjmOmZR">拍摄于深圳关上月美术馆。</p><p data-pid="Xain3jes">当时觉得这个画师真牛逼，8位武将画的各有帅法。</p><p><br></p><p data-pid="Qkm-QyrJ">【高仙芝】 端庄，威严</p><figure><noscript><img src="https://picx.zhimg.com/50/v2-3c32798de0a476aa6272617e3d22eb0f_720w.jpg?source=c8b7c179" data-rawwidth="1280" data-rawheight="1707" data-original-token="v2-3c32798de0a476aa6272617e3d22eb0f" class="origin_image zh-lightbox-thumb" width="1280" data-original="https://picx.zhimg.com/v2-3c32798de0a476aa6272617e3d22eb0f_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='1280'%20height='1707'&gt;&lt;/svg&gt;" data-rawwidth="1280" data-rawheight="1707" data-original-token="v2-3c32798de0a476aa6272617e3d22eb0f" class="origin_image zh-lightbox-thumb lazy" width="1280" data-original="https://picx.zhimg.com/v2-3c32798de0a476aa6272617e3d22eb0f_r.jpg?source=c8b7c179" data-actualsrc="https://picx.zhimg.com/50/v2-3c32798de0a476aa6272617e3d22eb0f_720w.jpg?source=c8b7c179"></figure><p><br></p><p data-pid="aZk54cjx">【尉迟恭】果敢、有谋</p><figure><noscript><img src="https://pic1.zhimg.com/50/v2-0e57698b6cc8e407d12b39b2bff3032c_720w.jpg?source=c8b7c179" data-rawwidth="1280" data-rawheight="1707" data-original-token="v2-0e57698b6cc8e407d12b39b2bff3032c" class="origin_image zh-lightbox-thumb" width="1280" data-original="https://pic1.zhimg.com/v2-0e57698b6cc8e407d12b39b2bff3032c_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='1280'%20height='1707'&gt;&lt;/svg&gt;" data-rawwidth="1280" data-rawheight="1707" data-original-token="v2-0e57698b6cc8e407d12b39b2bff3032c" class="origin_image zh-lightbox-thumb lazy" width="1280" data-original="https://pic1.zhimg.com/v2-0e57698b6cc8e407d12b39b2bff303
