</style></head><body><h1>已经离职了，前同事三番四次电话微信问工作的事该不该回复？</h1>
<p><small>回答：2020-08-09 16:08｜更新：2020-08-09 16:08｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/316732494/answer/1395981340">https://www.zhihu.com/question/316732494/answer/1395981340</a></small></p><hr><p data-pid="8UCHMiGW">回复是人情，不回复是本分。</p><p data-pid="cYMqqZ52">如果是我，我会明确告诉他，我能回答他几次，限定时间。</p><p data-pid="gr_DlMwB">过了之后，就再也不管了。</p><p data-pid="uZmQ_zNb">看到你的问题里面，前同事来问工作，既不客气，也不感谢。</p><p data-pid="byZjl0u3">So，just said NO.</p><p data-pid="02mFu7ec">工作和人生中永远有重要的一课：就是说No的能力，学会拒绝。</p></body></html>
