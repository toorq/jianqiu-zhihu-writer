<p><small>回答：2024-06-29 21:14｜更新：2024-06-29 21:14｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/26528726/answer/3546326339">https://www.zhihu.com/question/26528726/answer/3546326339</a></small></p><hr><p data-pid="2jmM1Bac">唉，别说了，人跟人的差距很大的。</p><p data-pid="v9bDAhhV">在习武的人眼里看来人的一生上下都是弱点，很多地方稍微发点力可能人就挂了。</p><p data-pid="4Wk0WeIr">过去的师傅说要积阴德，这些要害很多时候不爱教。因为学生只要学了基本都会手痒，想要试手。不知轻重，一下子就把人搞死，古代医疗条件又差，重伤内出血的话基本没治。</p><p data-pid="f7NosmvX">我现在都怕收不住力，把小孩子打坏了，所以基本不揍娃，特别不能用巴掌扇。</p></body></html>
