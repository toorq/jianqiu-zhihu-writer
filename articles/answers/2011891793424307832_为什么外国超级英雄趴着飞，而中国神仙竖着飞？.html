</style></head><body><h1>为什么外国超级英雄趴着飞，而中国神仙竖着飞？</h1>
<p><small>回答：2026-03-02 19:53｜更新：2026-03-02 19:53｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/26992616/answer/2011891793424307832">https://www.zhihu.com/question/26992616/answer/2011891793424307832</a></small></p><hr><p data-pid="IdYmoCw1">外国英雄是巡航导弹。</p><p data-pid="rki3ynUA">中国神仙是弹道导弹。</p><p data-pid="WmJqFkDu">巡航导弹很好理解，就是和飞机一样横着飞。</p><p data-pid="vdl01rli">弹道导弹，先加速升空，然后从天而降。</p></body></html>
