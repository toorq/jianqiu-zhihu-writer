</style></head><body><h1>为什么长期健身，身体强壮了，人却虚了？</h1>
<p><small>回答：2024-08-28 07:37｜更新：2024-08-28 07:37｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/466730886/answer/3608230998">https://www.zhihu.com/question/466730886/answer/3608230998</a></small></p><hr><p data-pid="bBMkhvVk">你这个问题不科学呀。</p><p data-pid="Jbqgwcgu">虚这个词，科学上不好认定，怎么能用迂腐的中医名词描述一个科学事实呢？</p><p data-pid="cRLWX9eQ">应该用指标，用科学的指标，做好双盲实验，n组对照，定义虚这个名词。</p><p data-pid="-M715wc6">要不然，我严重怀疑，虚这个词是你想象出来的安慰剂。</p><hr><p data-pid="UlG306w1">反串恶搞一次，纯娱乐，大家不要当真。</p></body></html>
