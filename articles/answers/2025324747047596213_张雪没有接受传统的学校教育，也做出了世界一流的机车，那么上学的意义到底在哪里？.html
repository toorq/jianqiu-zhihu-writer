</style></head><body><h1>张雪没有接受传统的学校教育，也做出了世界一流的机车，那么上学的意义到底在哪里？</h1>
<p><small>回答：2026-04-08 21:30｜更新：2026-04-08 21:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2022259595855364418/answer/2025324747047596213">https://www.zhihu.com/question/2022259595855364418/answer/2025324747047596213</a></small></p><hr><p data-pid="JOlJOjVM">很简单，这个现象很普遍。</p><p data-pid="mwu_WThT">企业的科研人员往往要比在学院的厉害，有的还不是厉害一点，会厉害很多。</p><p data-pid="Vv0Q4JyP">因为企业要是干不好，产品会被市场淘汰，人员会下岗回家灵活就业。</p><p data-pid="YI5Slc4b">可是学院不会，学院是另外一套考核体系，是考试，论文，学术构建起来的。</p></body></html>
