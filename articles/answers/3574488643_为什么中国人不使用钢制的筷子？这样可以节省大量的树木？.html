</style></head><body><h1>为什么中国人不使用钢制的筷子？这样可以节省大量的树木？</h1>
<p><small>回答：2024-07-26 18:20｜更新：2024-07-26 18:20｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/604570838/answer/3574488643">https://www.zhihu.com/question/604570838/answer/3574488643</a></small></p><hr><p data-pid="ZmYpIKQr">为什么老外不用木叉子，木刀，这样可以节约大量的钢铁。</p><p data-pid="lRq-bDv7">要知道，木头是可再生资源，钢铁可是不可再生资源。</p><p data-pid="Dxw9RaaD">古代筷子更环保，折下来两只树枝，竹枝就可以用了，这种不成才的树枝，要多少有多少，几乎可以认为是取之不竭的。同时代的不用筷子的人我也不知道怎么吃的的，也许用手抓着吃更环保，也许不洗手更环保。</p></body></html>
