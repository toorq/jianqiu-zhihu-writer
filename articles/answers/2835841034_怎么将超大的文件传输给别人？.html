<p><small>回答：2023-01-08 21:25｜更新：2023-01-08 21:25｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/334217095/answer/2835841034">https://www.zhihu.com/question/334217095/answer/2835841034</a></small></p><hr><p data-pid="0tVBArdk">才5G，我还以为50T。买块硬盘，然后顺风快递寄过去。</p><p data-pid="cNITRqNm">5G的话，随便找个直穿根据就丢过去了，比如QQ。</p><p data-pid="32O1eoS8">如果怕太大，可以用7zip等压缩工具分片一下。</p></body></html>
