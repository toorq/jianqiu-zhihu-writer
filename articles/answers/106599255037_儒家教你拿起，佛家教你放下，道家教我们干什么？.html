<p><small>回答：2025-02-21 11:38｜更新：2025-02-21 11:38｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/649207065/answer/106599255037">https://www.zhihu.com/question/649207065/answer/106599255037</a></small></p><hr><p data-pid="SYsyN55i">儒家教你拿起，佛家教你放下，</p><p data-pid="7tri1Ywl">道家教我们拿下。</p><p data-pid="OKenaiOc">性命双修，做内外都强大的自我，去做自己生命真正的主人。</p><p data-pid="pV6UX5FM">去知道，去行道，最后合乎于道，与天地之道融为一体。</p><p></p></body></html>
