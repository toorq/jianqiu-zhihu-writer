</style></head><body><h1>月薪4500怎么理财？月消费两千左右？</h1>
<p><small>回答：2017-09-09 14:24｜更新：2017-09-09 14:24｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/65107798/answer/227565806">https://www.zhihu.com/question/65107798/answer/227565806</a></small></p><hr><p data-pid="LJx6QGcj">谢邀。</p><p data-pid="OZZinDUR">人的精力有限，一天就24小时。</p><p data-pid="X6aIkhtL">当你收入只有4500的时候，正确的理财是积蓄。追求风险低，可是不需要花精力的理财。</p><p data-pid="x1BGsBCl">因为即使理财的投资回报率有30%每年，一年也只有2w*30%=6000的收入增加。</p><p data-pid="bDr7OtDW">应该把更多的时间投入的怎么提高自身技能，提高收入上。</p></body></html>
