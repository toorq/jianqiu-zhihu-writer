<p><small>回答：2024-08-06 14:40｜更新：2024-08-06 14:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/410271879/answer/3585703871">https://www.zhihu.com/question/410271879/answer/3585703871</a></small></p><hr><p data-pid="3cuMrYp5">看到这种问题真的是来气。</p><p data-pid="MD6UlG8U">这种引导性的，抹黑性的问题不知道从哪里来。</p><p data-pid="3oes7UPD">我的两个小孩都在上小学，他们的朋友也经常来家里玩，我没有看到小孩子口吐芬芳，反而因为受到的教育更好，营养更好，中国的新一代充满了希望。</p></body></html>
