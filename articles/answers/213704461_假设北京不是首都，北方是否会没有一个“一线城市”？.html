</style></head><body><h1>假设北京不是首都，北方是否会没有一个“一线城市”？</h1>
<p><small>回答：2017-08-13 21:16｜更新：2017-08-13 21:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/56081760/answer/213704461">https://www.zhihu.com/question/56081760/answer/213704461</a></small></p><hr><p data-pid="OIPTaRLe">我觉得不会，北方依然会有一线城市。</p><p data-pid="brC2hvWI">我对一线城市的定义，就是在某些领域能够领跑全国，就是在一个行业里，它是leader.</p><p data-pid="79PH_YRO">北方不缺天时，一样改革开放，不缺地利，一样有海岸线。</p><p data-pid="jvS-TAUH">也同样不缺人杰，你觉得北方几亿人就没有牛人？虽然我是南方人。</p><p data-pid="bQjef9wj">这些牛人一定会在一定的地方领导一个行业的。</p></body></html>
