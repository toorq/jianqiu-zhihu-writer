<p><small>回答：2017-11-30 13:38｜更新：2017-11-30 23:59｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/67621140/answer/268420204">https://www.zhihu.com/question/67621140/answer/268420204</a></small></p><hr><p data-pid="LlTmGaHb">药店里连买个钙片都能刷医保，医保要不亏才怪。</p><p data-pid="hsQTpQxf">做过分的时候，我见过药店用医保刷油、洗衣服、牙刷等日用品的。</p><p data-pid="3gAD0CKu">不管你买的是什么药，药店都可以帮你用医保刷，无非就是换个药名而已。</p></body></html>
