<p><small>回答：2026-02-07 10:51｜更新：2026-02-09 10:44｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2002425571242681024/answer/2003420550119302140">https://www.zhihu.com/question/2002425571242681024/answer/2003420550119302140</a></small></p><hr><p data-pid="8k5qOpjr">什么，你和我们中国人说：</p><p data-pid="Gs5DkVfL">死社稷……明月……收集三尸复活……</p><p data-pid="wLj6lKzI">好了，我们都懂了。</p><p data-pid="C6SKP6oU">为了不触发关键词，谢谢你，米哈游。</p><p data-pid="SfE2gbvW">原神一生粉。</p><hr><p data-pid="ksP574Mp">你观，可曾有几分故人之姿。</p><blockquote data-pid="q7aBFwuo">白皙丰下，丰颐隆准，眉目清扬，丹唇秀髭</blockquote><figure data-size="normal"><noscript><img src="https://pic1.zhimg.com/50/v2-a24fc3b7b64d6becb5c29740efbf299a_720w.jpg?source=c8b7c179" data-caption="" data-size="normal" data-rawwidth="592" data-rawheight="865" data-original-token="v2-c0220867b80d5607685c69f397b9ade8" class="origin_image zh-lightbox-thumb" width="592" data-original="https://pic1.zhimg.com/v2-a24fc3b7b64d6becb5c29740efbf299a_r.jpg?source=c8b7c179"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='592'%20height='865'&gt;&lt;/svg&gt;" data-caption="" data-size="normal" data-rawwidth="592" data-rawheight="865" data-original-token="v2-c0220867b80d5607685c69f397b9ade8" class="origin_image zh-lightbox-thumb lazy" width="592" data-original="https://pic1.zhimg.com/v2-a24fc3b7b64d6becb5c29740efbf299a_r.jpg?source=c8b7c179" data-actualsrc="https://pic1.zhimg.com/50/v2-a24fc3b7b64d6becb5c29740efbf299a_720w.jpg?source=c8b7c179"></figure><p></p></body></html>
