<p><small>回答：2024-04-17 20:02｜更新：2024-04-17 20:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/573378911/answer/3469438493">https://www.zhihu.com/question/573378911/answer/3469438493</a></small></p><hr><p data-pid="5vgLyrOT">中医粉不会不吃西药。</p><p data-pid="NcGuZsEP">中医粉不会全盘否定现代医学。</p><p data-pid="envgiKwW">中医粉也不会全盘肯定中医。</p><p data-pid="NyhpZOms">中医粉不是二极管，搞的和宗教一样，入了一个教就不能入其他教。</p><p data-pid="UkUSQ53_">中医粉也不是搞政治，入了一个党就不能再入另外一个党。</p><hr><p data-pid="MavjD8c8">不知道是谁的脑子这么二极管，非黑即白，估计可能脑容量不够，智商需要充值，所以只能做选择题，选择题的答案还只有A和B。</p></body></html>
