</style></head><body><h1>神车五菱宏光为什么这么火？</h1>
<p><small>回答：2020-05-11 20:28｜更新：2020-05-11 20:28｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/326261540/answer/1216200137">https://www.zhihu.com/question/326261540/answer/1216200137</a></small></p><hr><p data-pid="dGeiPCry">我觉得，在中国全面放开皮卡之前，会一直火下去。</p><p data-pid="4gJJi_t-">刚好在几年前参观过五菱的重庆工厂。</p><p data-pid="m0h72kEw">五菱的全程是：上海通用五菱，是上汽，通用，五菱三家企业合资的。</p><p data-pid="Q3cC19Q5">这家车厂的牛逼在于，做出的产品永远是最适合中国老百姓干活用的。</p></body></html>
