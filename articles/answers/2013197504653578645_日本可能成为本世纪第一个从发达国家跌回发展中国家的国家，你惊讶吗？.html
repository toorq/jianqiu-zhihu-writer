<p><small>回答：2026-03-06 10:21｜更新：2026-03-06 10:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/553932007/answer/2013197504653578645">https://www.zhihu.com/question/553932007/answer/2013197504653578645</a></small></p><hr><p data-pid="v3bY-sdb">历史上，日本就一直是和菲律宾坐一桌的。</p><p data-pid="1_L6p1VO">这是因为太多的巧合，中华沉沦，小人之国才能得志。</p><p data-pid="ByeaG-Jr">终究中华会回到她应该在的那个位置，</p><p data-pid="0B5fz63O">小人之国也会回到它应该在的位置，不过回去之前，之前的债一定要还清。</p></body></html>
