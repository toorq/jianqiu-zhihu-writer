</style></head><body><h1>如何评价西班牙首相称：「我知道在1583年中国已是一个伟大的强国」?</h1>
<p><small>回答：2026-04-14 23:17｜更新：2026-04-14 23:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2027344242008146543/answer/2027526038180111462">https://www.zhihu.com/question/2027344242008146543/answer/2027526038180111462</a></small></p><hr><p data-pid="FTui55ZZ">难道在暗示什么？</p><p data-pid="0lfT2M2b">我们西班牙这里有证明中国在1583年已经很伟大的证据？</p><p data-pid="Be02IoYb">大哥你现在又发达了，能不能给我点好处，我愿为马前卒？</p><hr><p data-pid="GZJJcdsD">高层政治不用那么具体，一些只言片语，关键是一个态度。</p></body></html>
