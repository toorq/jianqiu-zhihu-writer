</style></head><body><h1>怎么感觉俄罗斯快不行了，大帝撑不住了？</h1>
<p><small>回答：2024-08-27 21:14｜更新：2024-08-28 13:00｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/665235910/answer/3607973774">https://www.zhihu.com/question/665235910/answer/3607973774</a></small></p><hr><p data-pid="5tnThCzY">你再多感觉感觉，</p><p data-pid="kLJBeO91">也许跟许愿池一样，你感觉多了就灵了。</p><hr><p data-pid="e33KGcBo">破乎上最近这种感觉一问怎么越来越多。老是为什么我感觉这个，为什么我感觉那个，你自己的感觉问你自己去呀，谁能知道你什么感觉。</p><p data-pid="h3AUP1fa">想问问题，就好好摆事实，摆数据。</p><p data-pid="ROmBcpe0">感觉系问题老是感觉一个奇葩结论来文为什么，真是是让人怀疑。</p></body></html>
