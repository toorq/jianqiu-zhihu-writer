</style></head><body><h1>房价让当代青年有多绝望？</h1>
<p><small>回答：2020-08-25 16:32｜更新：2020-08-25 16:32｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/396685531/answer/1432729297">https://www.zhihu.com/question/396685531/answer/1432729297</a></small></p><hr><p data-pid="L9BPLdTd">我刚毕业的时候，领导鼓励我们：</p><p data-pid="5MH0jVr5">“好好干，争取早日买房。”</p><p data-pid="wRh0m8GU">我们感觉备受激励，加班加的更积极了。</p><p data-pid="ZhpMtz6B">现在十几年过去了，我也换成了校领导，我鼓励我的下属：</p><p data-pid="3OxDFB19">“好好干，争取早日买房。”</p><p data-pid="yxs2389y">下属直接怼我，老板你是在羞辱我们吗？就我们这个收入，买房？开玩笑吧。</p><p data-pid="RCPSQuJa">靠我们这工资这辈子是不要想了。及时行乐，开心就好。</p><p data-pid="T2VyTl8V">我感觉无言以对。</p></body></html>
