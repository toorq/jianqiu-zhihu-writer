</style></head><body><h1>长寿的人都有什么特点？</h1>
<p><small>回答：2026-01-28 10:23｜更新：2026-01-28 10:24｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/61419687/answer/1999789747657265170">https://www.zhihu.com/question/61419687/answer/1999789747657265170</a></small></p><hr><p data-pid="jshGoK_D">我家里没有什么长寿基因，祖上都是穷苦底层人，基本都是短生种。</p><p data-pid="0ZTjnjDC">我师承的拳派，拳祖们都挺长寿的，八九十是基本的，长寿一点的，就是一百起步了。</p><p data-pid="ZdHAQmrU">不知道我未来会怎么样。</p><p data-pid="ZxP4TAAf">我80后，40+，目前没有白发，牙齿目前一颗都还没蛀。</p></body></html>
