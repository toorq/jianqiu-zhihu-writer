</style></head><body><h1>电动汽车为什么都不保值？</h1>
<p><small>回答：2026-01-06 07:51｜更新：2026-01-06 07:51｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/457373455/answer/1991778998469039762">https://www.zhihu.com/question/457373455/answer/1991778998469039762</a></small></p><hr><p data-pid="C5Wheq5V">保值买黄金，买什么车。</p><p data-pid="MvuAcF58">日本车曾经也有保值神话，现在呢？</p><p data-pid="9YAXAyIB">汽车的本质是工业品，是工具，是交通工具。</p><p data-pid="woxp6HCT">就算是过去日本车非常保值的年代，虽然日本车省油耐操，可是比日本车便宜不保值的美国车其实综合成本是一样的。也就是你在油钱上省的，在车价上就不会省，市场会综合评价整体成本到一个大家差不多的值。</p><p></p></body></html>
