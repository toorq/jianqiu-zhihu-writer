</style></head><body><h1>男朋友的大脑是单线程的怎么办?</h1>
<p><small>回答：2019-12-17 00:56｜更新：2019-12-17 00:56｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/358389988/answer/938588350">https://www.zhihu.com/question/358389988/answer/938588350</a></small></p><hr><p data-pid="_QC9L6fc">其实这样的人特别好，容易沉浸在一个事情上，很专注。</p><p data-pid="Q_ESVWpe">我在年轻的时候，是可以一心二用的。</p><p data-pid="EVMrkba_">我可以一边写程序，一边和人聊天。</p><p data-pid="-slnsUdY">一遍看书，一遍追剧等等。</p><p data-pid="IVBoDy3k">可是现在我却刻意的让自己心不二用，神不外驰。</p><p data-pid="LQer2d4c">一方面是习武的要求，二是专注带来的感受和结果都比较好。</p><p data-pid="_8EMLSFs">无论是心还是神，都容易定住。</p></body></html>
