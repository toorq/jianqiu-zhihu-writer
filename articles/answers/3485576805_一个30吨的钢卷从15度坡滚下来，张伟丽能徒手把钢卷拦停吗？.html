</style></head><body><h1>一个30吨的钢卷从15度坡滚下来，张伟丽能徒手把钢卷拦停吗？</h1>
<p><small>回答：2024-05-02 17:12｜更新：2024-05-03 09:02｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/653703259/answer/3485576805">https://www.zhihu.com/question/653703259/answer/3485576805</a></small></p><hr><p data-pid="i0l5pA8A">搏击的本质是技击，也就是是一个技术活。</p><p data-pid="9-vdmHtu">一样的力气，打肚子上没事，打在喉管要害上就要命，这叫技击。</p><p data-pid="AU2gkxvZ">选择合适的角度，合适的力色，合适的步伐叫技击。</p><p data-pid="KGNnLLv7">而不是一般电影渲染的人能一拳打破墙……</p><hr><p data-pid="B011mz2Z">人再怎么练，也不能练成大象。</p><p data-pid="gLId7UQQ">而且30吨是什么概念你知道么，就是大象来了，也扛不住。</p></body></html>
