</style></head><body><h1>工厂工资已经给到6000了，还是招不到人怎么办？</h1>
<p><small>回答：2022-12-17 17:59｜更新：2022-12-17 17:59｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/509750432/answer/2805395187">https://www.zhihu.com/question/509750432/answer/2805395187</a></small></p><hr><p data-pid="rwVCyi9p">说明你被其它工厂劵下去了。</p><p data-pid="_LP_FMfB">有很多解决方案哈：</p><p data-pid="wzaDYNxg">1.关了厂子，卷不过不玩了</p><p data-pid="oxEk1Yci">2.搬去更便宜的地方</p><p data-pid="MpAWS_o_">3.加薪，如果你的厂子利润不够，加不动了就换个更高利润的行业</p><p data-pid="_zEolksn">4.还有个歪门邪道，有妹子，有网，有假期，准时发薪，有成长空间的厂更受欢迎</p><p data-pid="IJS7dyvV">为什么我会这么清楚，因为我真的在富士康厂线上待过。</p></body></html>
