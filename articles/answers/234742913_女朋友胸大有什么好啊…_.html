<p><small>回答：2017-09-24 16:17｜更新：2017-09-24 16:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/36910556/answer/234742913">https://www.zhihu.com/question/36910556/answer/234742913</a></small></p><hr><p data-pid="c-9IbJb1">肥皂剧常常会出现一种剧情：男主角富二代，年轻，帅，有钱，有的是钱，学历高，总之你能想到的他娘的他老爹全都有，而且全部给他。</p><p data-pid="ZKqiMxON">然后他再天天摆出一副哭丧脸，淡淡的来一句：这些都不是我想要的……</p><p data-pid="kbksMN2a">真想扁他。</p><p data-pid="aD3MgOAt">题主的这个问题，也有这种效果。</p></body></html>
