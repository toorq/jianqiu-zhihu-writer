</style></head><body><h1>如果美国的GDP总量不是世界第一，会有什么影响?</h1>
<p><small>回答：2023-01-05 13:16｜更新：2023-01-05 15:19｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/532856549/answer/2830728839">https://www.zhihu.com/question/532856549/answer/2830728839</a></small></p><hr><p data-pid="Dy8zhCSY">第一的名头美国你一定要坐稳扶好，我们中国永远第二，永远是发展中国家。</p><p data-pid="HAWlNOjv">避虚名而求实惠中国人普通老百姓都懂得。</p><p data-pid="RPEDmyFa">我们不需要谋求全球第一，全球霸权的虎皮。</p><p data-pid="qg9coK9z">GDP注水这种事情，就好像衰落下来的贵族，虽然里子已经知道没有了，可是面子却是万万不能输的，这剧情中国人熟读红楼梦，熟悉的很。</p></body></html>
