</style></head><body><h1>《原神》凝光为什么不是五星？</h1>
<p><small>回答：2024-01-19 11:28｜更新：2024-01-19 11:28｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/429909315/answer/3368206134">https://www.zhihu.com/question/429909315/answer/3368206134</a></small></p><hr><p data-pid="3FvZMVjS">本来凝光肯定是5星，毕竟是整个提瓦特最富有的城市——璃月港的最优权势和财富的“人”（不包括魔神）。所以5星是不够的，最少要10个星。</p><p data-pid="tm_8_Po0">可是人家群玉阁砸下去，砸瘫痪了一个魔神，富婆损失了大量的财产，耗费了大量体力，自然降级了一些。</p><p data-pid="mMQLRvC8">要不然，就剧情模式里面凝光的大招，让我想起了fate的金闪闪，哈哈。</p></body></html>
