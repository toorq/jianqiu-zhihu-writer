<p><small>回答：2025-07-18 10:40｜更新：2025-07-18 10:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/324675316/answer/1929490637339754816">https://www.zhihu.com/question/324675316/answer/1929490637339754816</a></small></p><hr><p data-pid="V26AxN_d">因为你自己可能比较水，所以接触不到大佬……</p><p data-pid="4T-Qr3Z-">泪奔┭┮﹏┭┮</p><p data-pid="KFnItHBq">我说的不是你，我说的是我。</p><hr><p data-pid="gaX5twzG">还有一种可能是你自己水平挺高，</p><p data-pid="laXMjDwt">你身边也都和你差不多，</p><p data-pid="KahsStdi">所以认知偏差了，觉得他们也不怎么高。</p></body></html>
