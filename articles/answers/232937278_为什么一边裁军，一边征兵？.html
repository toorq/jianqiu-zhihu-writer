</style></head><body><h1>为什么一边裁军，一边征兵？</h1>
<p><small>回答：2017-09-20 19:35｜更新：2021-07-14 10:56｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/65603596/answer/232937278">https://www.zhihu.com/question/65603596/answer/232937278</a></small></p><hr><p data-pid="uodGMC47">人会一边排泄，一边吃喝，目的是：新陈代谢。</p><p data-pid="rBYpVnoM">公司会一边裁员一边招新人，目的是：“换血”。</p><p data-pid="AEIUaP2g">换掉就血，进入新血液，如同人体的新陈代谢、吐故纳新。</p><p data-pid="MnEl_SuP">把一些技能老化，年纪大的员工扫出公司。然后招聘一些有技能，年轻的员工就来。是的，人类组织都tmd的是怪兽。这个世界对老人太残忍了。</p></body></html>
