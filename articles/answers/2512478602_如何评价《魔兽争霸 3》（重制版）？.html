</style></head><body><h1>如何评价《魔兽争霸 3》（重制版）？</h1>
<p><small>回答：2022-06-02 20:03｜更新：2022-06-02 20:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/301085227/answer/2512478602">https://www.zhihu.com/question/301085227/answer/2512478602</a></small></p><hr><p data-pid="_r8n88d0">我买的网易的重置版本。</p><p data-pid="YmxbV4hc">感觉就是花了100多买了个皮肤，而且这个皮肤还巨丑无比，大量的细节没到位就这么放出来了。</p><p data-pid="5t4atC9g">暴雪真的已经不是当年的暴雪了，从暗黑3，星际2开始，游戏质量已经在明显下降了。</p><p data-pid="ut_yCjrN">花掉的钱，就当给当年的玩的盗版买单了（其实我当时玩的是正版，有正版光盘）。</p></body></html>
