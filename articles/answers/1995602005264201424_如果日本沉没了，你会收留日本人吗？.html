<p><small>回答：2026-01-16 21:03｜更新：2026-01-16 21:03｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/3684843653/answer/1995602005264201424">https://www.zhihu.com/question/3684843653/answer/1995602005264201424</a></small></p><hr><p data-pid="VW7AUgbU">收留个毛线，中国不接受难民。</p><p data-pid="QtpVFRi2">全世界人民大团结，不是学苏联搞大家长，搞修正主义。</p><p data-pid="-GGSn5RN">而是要把中华建成地上天国一样的美好国家，然后让全世界人民心神往之。</p><p data-pid="94owPzV1">主动地去学习，理解我们的文明，我们的文化，我们的制度。然后自己去解放自己。</p><hr><p data-pid="eI8tkvTR">在工业革命 4.0 时代，领土的概念早就变了，人口的概念也变了。</p></body></html>
