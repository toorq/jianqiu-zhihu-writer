</style></head><body><h1>大多数香港人还是瞧不起内地和内地人，归根结底是因为内地穷吗?</h1>
<p><small>回答：2024-02-27 10:56｜更新：2024-02-28 11:41｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/627804472/answer/3410754194">https://www.zhihu.com/question/627804472/answer/3410754194</a></small></p><hr><p data-pid="cX0sprsB">他可以看不起你，你也可以看不起他呀？</p><p data-pid="dPcv-cXN">人家什么想是人家的事情。</p><p data-pid="2RTOwMWL">有些人总是需要有奇奇怪怪的优越感包装来保护自己脆弱的小内心。</p><p data-pid="oytNK1CL">本质上无知和脆弱。</p><p data-pid="ijUM3sv6">对于脑子有问题的人的无知和脆弱不要太理会，这样的人可能基本的地理历史政治常识都没有。觉得近代HK的发展是单纯的HK人是上等人的结果。</p></body></html>
