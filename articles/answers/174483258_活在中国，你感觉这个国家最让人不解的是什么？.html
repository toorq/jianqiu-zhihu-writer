</style></head><body><h1>活在中国，你感觉这个国家最让人不解的是什么？</h1>
<p><small>回答：2017-05-25 21:04｜更新：2017-05-25 21:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/38708083/answer/174483258">https://www.zhihu.com/question/38708083/answer/174483258</a></small></p><hr><p data-pid="Qzqtp0oJ">1）鼓励不孝有三，无后为大。却对性觉得羞耻。</p><p data-pid="sGyxbHlH">2）抱怨一场不公平的宴席，抱怨的内容常常是自己没有在座位上，而不是宴席本身。</p><p data-pid="GOs1cbbd">3）重男轻女，却鼓励孝道。咳咳，好像自己的最应该孝顺的妈就是女的。</p><p data-pid="-jgFm4W2">4）鼓励什么，往往什么就是不挣钱的。比如不鼓励炒房，鼓励创业。可是炒房是最挣钱的，创业是最苦逼的。</p></body></html>
