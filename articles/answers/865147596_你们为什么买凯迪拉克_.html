<p><small>回答：2019-10-21 21:32｜更新：2019-10-21 21:32｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/327921864/answer/865147596">https://www.zhihu.com/question/327921864/answer/865147596</a></small></p><hr><p data-pid="Ir1g64mZ">作为CT6车主。</p><p data-pid="7xJ4_52f">我很喜欢凯迪拉克。</p><p data-pid="TSHtgD5q">不像ABB那么高调。</p><p data-pid="SGd55Keq">也没有拉长带来的难看的车身比例。</p><p data-pid="N5cKGNuG">豪华感不夸张，刚刚好。</p><p data-pid="nfXM5oGI">动力也不错。</p><p data-pid="7ZNVZyzr">特别是那个竖状的头尾灯，独树一帜，有一种老美国片的感觉。</p></body></html>
