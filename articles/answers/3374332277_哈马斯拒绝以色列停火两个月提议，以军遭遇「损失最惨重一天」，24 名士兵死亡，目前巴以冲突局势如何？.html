<p><small>回答：2024-01-24 14:07｜更新：2024-01-24 14:07｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/640924565/answer/3374332277">https://www.zhihu.com/question/640924565/answer/3374332277</a></small></p><hr><p data-pid="QsrHaBG6">巷战真是拿人命填！</p><p data-pid="jg_79GXx">一孩子从出生的哭泣，母亲父亲的悉心照顾，慢慢长大，慢慢学习，每一次生病的呵护和焦虑。</p><p data-pid="rDq4wkB5">最后变成一瞬间的炮灰，战争真残酷。</p><p data-pid="y1tTUGA1">在战争绞肉机面前，所有的一切财富，武器，人命都是数字……</p></body></html>
