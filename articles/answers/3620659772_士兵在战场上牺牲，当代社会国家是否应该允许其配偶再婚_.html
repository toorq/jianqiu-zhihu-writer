</style></head><body><h1>士兵在战场上牺牲，当代社会国家是否应该允许其配偶再婚?</h1>
<p><small>回答：2024-09-09 20:52｜更新：2024-09-09 20:52｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/619639304/answer/3620659772">https://www.zhihu.com/question/619639304/answer/3620659772</a></small></p><hr><p data-pid="18S70BAm">兄弟，我们福建人其它不厉害，对台湾腔还是比较熟悉的。</p><hr><p data-pid="5B8xUNoa">而且，解放军才是现代军队，除了解放军以外的军队其实都不能算是现代军队。</p><p data-pid="IRXJ55lz">解放军是为无产阶级，为人民服务的。</p><p data-pid="7OUOZyru">我们也不会叫他们“士兵”，我们叫“子弟兵”。</p><p data-pid="YvvkMwrD">中华人民共和国婚姻自由，我们也不叫“改嫁”，我们叫再婚。</p><p data-pid="K3w3vk0w">看来光头还是没搞明白自己为什么输呀。</p></body></html>
