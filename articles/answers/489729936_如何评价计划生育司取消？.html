</style></head><body><h1>如何评价计划生育司取消？</h1>
<p><small>回答：2018-09-11 20:33｜更新：2018-09-11 20:33｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/294182837/answer/489729936">https://www.zhihu.com/question/294182837/answer/489729936</a></small></p><hr><p data-pid="B7YftykM">我曾经在之前的答案中预言2020年前，计划生育会取消。</p><p data-pid="WydtBuaZ">现在看来，这个时间点会来的更快一些。说明生育数据可能比我们想象的可能更差一些。</p><p data-pid="lvlZ-h2_">大家为了中华民族的伟大复兴，多生娃。</p><p data-pid="nkN3pHZ7">所以说滴滴那两个司机真是死刑太轻，多好的中华民族优秀基因的适龄生育女性，等于是干掉了未来至少4个新生人口，它娘的畜生不如。</p></body></html>
