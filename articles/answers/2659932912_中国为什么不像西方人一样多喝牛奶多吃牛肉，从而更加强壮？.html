</style></head><body><h1>中国为什么不像西方人一样多喝牛奶多吃牛肉，从而更加强壮？</h1>
<p><small>回答：2022-09-04 22:37｜更新：2022-09-04 22:37｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/549609371/answer/2659932912">https://www.zhihu.com/question/549609371/answer/2659932912</a></small></p><hr><p data-pid="7zzVh9u0">一方水土养一方人。</p><p data-pid="yKLZ5Poi">中国人不吃那么多牛奶牛肉。</p><p data-pid="9cbI3tvV">靠吃猪肉、各种花样繁多的豆制品（豆腐，豆花，豆皮，腐竹……）、海鲜（沿海地区）、各种鱼类……也可以获得足够的蛋白质长得强壮。</p><p data-pid="tfoP1qL2">吃什么肉不关键，吃法，运动量，个人体质等等才更重要。</p></body></html>
