</style></head><body><h1>同一栋楼里，高楼层的邻居办葬礼，需用到电梯运送遗体，该不该同意？</h1>
<p><small>回答：2024-03-06 21:09｜更新：2024-03-06 21:09｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/644660825/answer/3421104569">https://www.zhihu.com/question/644660825/answer/3421104569</a></small></p><hr><p data-pid="0AUBVzp4">如果是你家电梯，你有权不同意。</p><p data-pid="BqqevLku">如果是公用的电梯，不好意思，你真没有这个权力。</p><p data-pid="Ok-zCc4d">神州大陆几千年，那片土地上没死过人，哪篇土地上有句话没生过人，别那么忌讳。</p><p data-pid="E-BzvidG">人又不是你弄没得，怕啥。与人方便，是善布施，人家做鬼也感恩你。</p></body></html>
