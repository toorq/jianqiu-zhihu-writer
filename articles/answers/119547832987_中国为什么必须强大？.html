<p><small>回答：2025-03-08 17:54｜更新：2025-03-13 10:37｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/280691023/answer/119547832987">https://www.zhihu.com/question/280691023/answer/119547832987</a></small></p><hr><p data-pid="T9j6oS-6">因为我是中国人。</p><p data-pid="Nbn3eUHH">我不会去问为什么中国必须强大，</p><p data-pid="l2UR3D31">我只会去问怎么让中国强大。</p><hr><p data-pid="gOU7RVps">我身，我家，我土。</p><p data-pid="KfnfHt0M">只要血不能改，心不能换，</p><p data-pid="9JQipkJ0">那么这种问题就只有立场，没有为什么。</p></body></html>
