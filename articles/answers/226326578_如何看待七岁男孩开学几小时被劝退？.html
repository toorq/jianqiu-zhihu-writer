</style></head><body><h1>如何看待七岁男孩开学几小时被劝退？</h1>
<p><small>回答：2017-09-06 19:58｜更新：2017-09-06 19:58｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/64851133/answer/226326578">https://www.zhihu.com/question/64851133/answer/226326578</a></small></p><hr><p data-pid="LmVgiJ-D">大量从事小学教育的朋友和我说给各种熊孩子的熊事情。</p><p data-pid="6QZ-dgkD">比如上课突然站起来唱歌。</p><p data-pid="-GMu2dHF">又比如上课图站起来跑到操场上去玩。</p><p data-pid="J4f9P-O-">再比如上课突然打起来。</p><p data-pid="eYUjO_V6">在长年和熊孩子的斗争中，这些教师战士们大多吼出了咽炎。</p><p data-pid="j_rNXB_9">然后叫家长。</p><p data-pid="VivCj4A2">在长年和熊孩子的家长斗争中，这些教师战士们们总结出了一条规律：</p><p data-pid="RHwbzL-F">孩子有多不靠谱，家长就有多不靠谱。</p><p data-pid="FR_MK5FS">反之亦然。</p></body></html>
