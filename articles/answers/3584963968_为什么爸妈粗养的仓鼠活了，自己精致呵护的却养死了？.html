</style></head><body><h1>为什么爸妈粗养的仓鼠活了，自己精致呵护的却养死了？</h1>
<p><small>回答：2024-08-05 21:12｜更新：2024-08-05 21:12｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/474080762/answer/3584963968">https://www.zhihu.com/question/474080762/answer/3584963968</a></small></p><hr><p data-pid="kxdsmBHX">你觉得精心，是你认为的精心，而不是顺应仓鼠的精心。</p><p data-pid="r6-5f07k">看过多少仓鼠饲养的书？你了解他们的习性吗？你了解他们喜欢吃什么？你知道他们的常见病吗？</p><p data-pid="KLjgihQQ">如果都不知道，这就是我执。</p></body></html>
