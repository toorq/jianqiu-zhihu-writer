</style></head><body><h1>父母都是 985 学历，为什么不亲力亲为，反而送孩子上辅导班？</h1>
<p><small>回答：2018-02-27 10:30｜更新：2018-02-27 10:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/265916935/answer/329412537">https://www.zhihu.com/question/265916935/answer/329412537</a></small></p><hr><p data-pid="HJNb5idZ">以为成本问题，教育本事是很贵的一个事情，能够解决的方法只有一次多教几个学生。</p><p data-pid="RqUykjfZ">父母都是985毕业，他们自己的时间收益大于请老师来教的成本。</p><p data-pid="xkMOCbLn">而且教育本事是一个专业的事情。</p><p data-pid="ZXDIZ6qw">社会生产力的提高来自于社会分工。</p></body></html>
