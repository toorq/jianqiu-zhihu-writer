<p><small>回答：2025-11-23 16:06｜更新：2025-11-23 16:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/458248111/answer/1975958468088321075">https://www.zhihu.com/question/458248111/answer/1975958468088321075</a></small></p><hr><p data-pid="TeRkVEq_">蹈光养晦是比较好听的说法，</p><p data-pid="Lyn5NMWY">难听一点的是装孙子，甚至割肉饲鹰……</p><p data-pid="hCZElKs7">再说的伟大一点是战略欺骗，示弱。</p><p data-pid="lUe7ZM1m">所以改开后几十年不只有停掉很多独立自主的项目，还有适当放任的文化渗透，西式洗脑，甚至教材等等……</p><p data-pid="duglwVDB">其实挺危险的，搞不好真的被渗透没了，步苏联后尘。</p><p data-pid="AdULUjqL">还好我们挺过来了。</p></body></html>
