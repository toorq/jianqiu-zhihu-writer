</style></head><body><h1>父亲想动用给我留学的存款去买房子，我该怎么办？</h1>
<p><small>回答：2017-08-25 12:38｜更新：2017-08-25 12:43｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/64291949/answer/220192941">https://www.zhihu.com/question/64291949/answer/220192941</a></small></p><hr><p data-pid="EgBEk3Ns">我虽然同意，不要在这个高点进去做接盘侠。</p><p data-pid="EvG7KF8m">可是逻辑上要搞清楚，这是谁的钱。</p><p data-pid="lyniTHEV">不是你的留学的钱，而是你父亲用来准备给你留学的钱，所有人是你父亲，而不是你。</p><p data-pid="5kpbHp4l">这个问题，需要和您自己的父亲理性的一起分析，证明你留学，可以给家庭更高的投资回报。同时一定要对父母心存感激，因为毕竟不是你自己挣来的钱。</p></body></html>
