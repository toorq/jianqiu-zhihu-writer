</style></head><body><h1>为什么我逛了一圈 B 站，感觉美国成第三世界国家了?</h1>
<p><small>回答：2024-06-17 11:34｜更新：2024-06-22 19:18｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/658748575/answer/3532982214">https://www.zhihu.com/question/658748575/answer/3532982214</a></small></p><hr><p data-pid="WzmaqU6E">美国既是第三世界，也是第一世界。</p><p data-pid="HoKYtnp1">那决定于你有钱没钱，你住富人区还是穷人区。</p><p data-pid="cJHxomCJ">end.</p><p data-pid="tEgP0Q_z">不吹不黑，其实在全世界哪里都差不多。</p><p data-pid="WveHZo2y">只是我们这边，作为社会主义国家，给穷人兜底，应该是全世界做的最好的之一了。</p><p data-pid="JwkNNniO">真的去过美国和美国接触的人，会体会到什么叫：真正的资本主义，真正的社会达尔文主义。</p></body></html>
