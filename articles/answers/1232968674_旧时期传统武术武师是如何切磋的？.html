</style></head><body><h1>旧时期传统武术武师是如何切磋的？</h1>
<p><small>回答：2020-05-19 18:02｜更新：2020-05-19 18:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/391330863/answer/1232968674">https://www.zhihu.com/question/391330863/answer/1232968674</a></small></p><hr><p data-pid="J6K0e4NV">我知道基本分两种</p><p data-pid="ggrSCc1P">文明一点，不动马，谁先动马谁输</p><p data-pid="nrAHmudy">叫单机，双机。单手相碰起手，单手先碰。双机起手，双手都碰。</p><p data-pid="7_s5ixWZ">不文明一点，打动马的。</p><p data-pid="bZSHiqJa">叫战手，打到一方倒下或认输就好。</p><p data-pid="jnT8ii0v">一般传武达到自己失去平衡，知道自己技不如人，输的一遍就会认输了。</p><p data-pid="O5vGYZ-D">当然这点也不好，长期下去，让传武的人，养成了习惯，赢了就收手，和不这样想的人过手会吃亏。</p></body></html>
