</style></head><body><h1>某医院未经我允许将我的家人送进抢救室，我该结费用吗？</h1>
<p><small>回答：2024-06-17 12:04｜更新：2024-06-17 12:04｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/597129884/answer/3533015776">https://www.zhihu.com/question/597129884/answer/3533015776</a></small></p><hr><p data-pid="PZhze-CO">我要是遇到这种负责的好医生，我会下跪磕头感谢救了我亲妈。</p><p data-pid="AKSPc1pN">你以为医生吃饱了撑着，我眼睛要是长了透视眼能知道是不是普通感冒我还送我亲妈去医院干嘛。</p><p data-pid="69x-20DL">当然，我说的都是我自己，我自己如果遇到这样的事情会怎么办。</p><p data-pid="aY_fSV-t">没说你，你随意，毕竟这不属于法律规定，你爱怎么整是你的自由。</p></body></html>
