<p><small>回答：2022-12-18 13:56｜更新：2022-12-18 16:31｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/39621513/answer/2806303893">https://www.zhihu.com/question/39621513/answer/2806303893</a></small></p><hr><p data-pid="rRyAlYG-">那句台词尬死了。</p><p data-pid="8qq6mSBn">你看不出来，这是一个老牛想吃进口嫩草随便编出来的一个借口么…………</p><p data-pid="enQAFZW3">难道整个中国就找不出一个会充分运用肌肉骨骼韧带的跳舞的人？</p><p data-pid="xQfuwq3O">电影就是电影，小说就是小说，都是娱乐行业，看个开心就得了，不要太当真。</p></body></html>
