</style></head><body><h1>如何看待福州全面放开落户条件，对未来福州房价有什么影响?</h1>
<p><small>回答：2020-12-18 19:44｜更新：2020-12-18 19:44｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/434837094/answer/1633776740">https://www.zhihu.com/question/434837094/answer/1633776740</a></small></p><hr><p data-pid="CRqH_lmv">前几年城市是抢人才，现在是抢人口。</p><p data-pid="JZchXBz7">一线城市抢人才，买不起房的你就走吧。</p><p data-pid="Psrs_xvn">二线城市抢人口，买不起房的你也走吧。</p><p data-pid="yGIvjCh8">三线城市要防守，好好左后好山好水好风光，生活乐无边，别走了，孩子。</p><p><br></p><p data-pid="B9vzVUhQ">另一个侧面也说明了，福州认清了自己的地位，不再追求抢人才，知道现在要在抢人口大战中加油了。</p><p data-pid="geRN4T9V">好事情。</p></body></html>
