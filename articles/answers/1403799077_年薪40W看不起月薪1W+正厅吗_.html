</style></head><body><h1>年薪40W看不起月薪1W+正厅吗?</h1>
<p><small>回答：2020-08-12 19:22｜更新：2020-08-12 20:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/410823761/answer/1403799077">https://www.zhihu.com/question/410823761/answer/1403799077</a></small></p><hr><p data-pid="Gs2DN1CH">21世纪，中国年轻人的价值观不应该是：1W+的正厅看不起，40w年薪的。</p><p data-pid="GiJKIim7">也不应该是40w年薪的可以看不起1w+正厅干部。</p><p data-pid="el2lcsaS">所有的回答都围绕着谁钱多，谁权多，谁社会地位高。</p><p data-pid="tGon3_IQ">难道没人想过一样都是人，因为谁钱多，谁权多，谁社会地位高，谁看不起谁本身就是错误的么？</p></body></html>
