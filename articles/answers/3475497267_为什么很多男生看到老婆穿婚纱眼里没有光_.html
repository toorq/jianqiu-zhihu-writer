</style></head><body><h1>为什么很多男生看到老婆穿婚纱眼里没有光?</h1>
<p><small>回答：2024-04-23 10:29｜更新：2024-04-23 10:29｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/652899926/answer/3475497267">https://www.zhihu.com/question/652899926/answer/3475497267</a></small></p><hr><p data-pid="W9j6wctQ">众所周知，人类的眼睛是一个接受光的器官，人类的眼睛本身并不发光。</p><p data-pid="97196kGI">也就是说，它只能反光。</p><p data-pid="742pn2kc">对面发光它就发光，对面没光，它就没光。</p><p><br></p><figure data-size="normal"><noscript><img src="https://pic1.zhimg.com/50/v2-762b51aef0b76566f9055ce264cedc34_720w.jpg?source=c8b7c179" data-size="normal" data-rawwidth="240" data-rawheight="240" data-original-token="v2-a8dd13e8a11ce8a830db6e4872f9e877" data-default-watermark-src="https://picx.zhimg.com/50/v2-53fc52b99f54e7089df49307fc3883a9_720w.jpg?source=c8b7c179" class="content_image" width="240"></noscript><img src="data:image/svg+xml;utf8,&lt;svg%20xmlns='http://www.w3.org/2000/svg'%20width='240'%20height='240'&gt;&lt;/svg&gt;" data-size="normal" data-rawwidth="240" data-rawheight="240" data-original-token="v2-a8dd13e8a11ce8a830db6e4872f9e877" data-default-watermark-src="https://picx.zhimg.com/50/v2-53fc52b99f54e7089df49307fc3883a9_720w.jpg?source=c8b7c179" class="content_image lazy" width="240" data-actualsrc="https://pic1.zhimg.com/50/v2-762b51aef0b76566f9055ce264cedc34_720w.jpg?source=c8b7c179"><figcaption>我真的是在讨论一个生物问题，没在阴阳。</figcaption></figure><p></p></body></html>
