</style></head><body><h1>跟每个人都能聊的来，却没有真正的好朋友，是什么原因？</h1>
<p><small>回答：2023-01-19 10:50｜更新：2023-01-19 10:50｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/424471679/answer/2851956077">https://www.zhihu.com/question/424471679/answer/2851956077</a></small></p><hr><p data-pid="MvroHmzg">看你怎么定义朋友。</p><p data-pid="ziNbCpK3">你能聊得来的，算好朋友么？我觉得不算。当时可以算是普通朋友，也就是点头之交。</p><p data-pid="Ho9wmV2J">真正的好朋友是什么呢？</p><p data-pid="s89c18Ih">真正的朋友是讲立场，不讲道理的。</p><p data-pid="oCou1jFr">所以好好先生，不粘锅，就是有朋友，没有真正的朋友……</p></body></html>
