</style></head><body><h1>为什么美国中小学生学的数学比我们简单，美国人却还能做出超级牛的东西？</h1>
<p><small>回答：2022-12-12 14:15｜更新：2022-12-12 14:15｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/20953633/answer/2798152011">https://www.zhihu.com/question/20953633/answer/2798152011</a></small></p><hr><p data-pid="8Rx8gLV0">第一，美国大学教育并不简单。</p><p data-pid="dyfLArtX">第二，不是只有美国能做出超级牛的东西。</p><p data-pid="VxT5O4Ah">第三，不是所有做出超级牛的东西的人都是在美国出生，美国受的教育。</p><p><br></p><p data-pid="JXDDgLO2">简单明了，逻辑清晰，一切都不是问题。</p></body></html>
