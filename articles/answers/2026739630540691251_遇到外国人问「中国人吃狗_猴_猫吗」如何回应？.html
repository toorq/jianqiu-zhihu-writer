<p><small>回答：2026-04-12 19:13｜更新：2026-04-12 19:13｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/306615628/answer/2026739630540691251">https://www.zhihu.com/question/306615628/answer/2026739630540691251</a></small></p><hr><p data-pid="BoXbZWsf">你们吃牛吗？</p><p data-pid="-cifO1VU">太可怕了，牛也是人类的伙伴，智商和狗差不多，甚至还高。</p><p data-pid="qvJewsye">牛市传统上中国重要的生产资料，我们中国人长期是不吃牛肉的。</p><p data-pid="KVmONXTT">什么，你们在那个岛上，还吃人……</p></body></html>
