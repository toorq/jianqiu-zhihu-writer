</style></head><body><h1>为什么以前稀粥和咸菜随便吃就能培养出死士，现在一个月6000都招不来工人？</h1>
<p><small>回答：2024-08-21 23:17｜更新：2024-08-21 23:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/647455658/answer/3601994490">https://www.zhihu.com/question/647455658/answer/3601994490</a></small></p><hr><p data-pid="3jnMnavR">你这句话倒挺符合Pua精髓的。</p><p data-pid="ZTe2fm9g">我也给你来一句，</p><p data-pid="ybKLPL_Y">为什么别人的老公每年年入百万都能对他老婆百依百顺，你怎么就不行呢。</p><p data-pid="CAocpKJB">为什么别人的小孩都不用父母管？每次考试都能考班级第一名，而你就不行。</p><p data-pid="gmEIw2nB">通过虚构一个不存在的情况，来贬低现在的实际情况，真是很好用的pua招数。</p></body></html>
