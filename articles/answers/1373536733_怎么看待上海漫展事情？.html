<p><small>回答：2020-07-31 15:15｜更新：2020-07-31 15:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/409942614/answer/1373536733">https://www.zhihu.com/question/409942614/answer/1373536733</a></small></p><hr><p data-pid="B0F_2uoi">一个中年的大叔，相对年轻女孩子说：</p><p data-pid="CROyjo3N">做自己，为自己活。</p><p data-pid="JX8AhNVq">道德这种东西，拿来要求自己就好。</p><p data-pid="RicfIsk-">道德拿来要求自己有多高尚，拿来要求别人就有多丑恶。</p><p data-pid="OPeUfv_I">只要不违反国家法律，公序良德，就要做自己，人家违法，自然有警察来管。</p></body></html>
