<p><small>回答：2026-01-23 21:06｜更新：2026-01-23 21:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/654275419/answer/1998139616407098350">https://www.zhihu.com/question/654275419/answer/1998139616407098350</a></small></p><hr><p data-pid="k3d_dAmd">看不出来么，现代战争所有武器几乎都在给导弹服务。</p><p data-pid="s0hjrF1g">驱逐舰是用来射导弹的，航母起飞飞机也是用来射导弹的。</p><p data-pid="_gHL3lXb">无人机也在射导弹，fpv无人机也可以说也是一种导弹……</p><p data-pid="V-vKyJIB">既然都是用来射导弹，其实用什么射意义并不大了。歼10射的空空导弹和歼20射的是一样的。</p><p data-pid="9iW09cOn">六爷，还能再战100年，反正能拉能射就好啦。</p></body></html>
