<p><small>回答：2024-04-04 19:40｜更新：2024-04-04 19:40｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/651395996/answer/3454510890">https://www.zhihu.com/question/651395996/answer/3454510890</a></small></p><hr><p data-pid="Z4Bxy1-q">因为有人代入的是土地所有者，而不是被地主折磨的要死要活的佃农，农奴，无产农民……</p><p data-pid="yymdLn-_">说白了就是想当地主。</p><p data-pid="ukFkJG4a">可是会这么思考的人，大概率在那种丛林法则下面，也干不上地主。</p><p data-pid="87okI6CI">无非是没见过什么叫真正的资本主义。</p><p></p></body></html>
