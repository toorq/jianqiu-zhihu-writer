</style></head><body><h1>张雪峰不幸去世，怎么评价他的一生？</h1>
<p><small>回答：2026-04-08 20:55｜更新：2026-04-08 20:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/2019897934204946347/answer/2025315984639112788">https://www.zhihu.com/question/2019897934204946347/answer/2025315984639112788</a></small></p><hr><p data-pid="_Udh9HZd">其实张老师真的挺好的，其实社会中下层一个最大的问题就是信息差。</p><p data-pid="6nZy_aer">我这里不攻击任何国家和任何体制，因为阶级是天然客观存在的，在任何国家，任何民族的人类社会都存在。</p><p data-pid="FHwPpawv">底层阶级穷的往往不只是金钱，而是信息的匮乏。</p><p data-pid="4LCIC1bk">我们80后当年要是有张老师，我真的可以少走N多弯路。</p></body></html>
