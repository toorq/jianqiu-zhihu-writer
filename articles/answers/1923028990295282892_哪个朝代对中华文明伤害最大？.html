<p><small>回答：2025-06-30 14:43｜更新：2025-07-01 09:16｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/862156400/answer/1923028990295282892">https://www.zhihu.com/question/862156400/answer/1923028990295282892</a></small></p><hr><p data-pid="3izPLkIf">我做了个梦，只是一个梦：</p><p data-pid="VqNW1Saw">如果在某个西方豪门的地下十层（比如梵蒂冈）的保险箱里面，</p><p data-pid="dxHRxUs0">藏的不是金子，</p><p data-pid="jSqOh6uy">而是《永乐大典》和所有明史资料……</p><p data-pid="e8Vgwx1q">会是什么场景？</p><p data-pid="pasO_B9M">他们又为什么要藏呢？</p><hr><p data-pid="Y8q17dtH">你知道我们南方学传统武术的，听老一辈说，</p><p data-pid="Bhvkts9U">过去是怎么用“银样蜡枪头”……等手段，硬是把汉人的武脉传下来的么……</p></body></html>
