</style></head><body><h1>考博准备中，请问我适合找一个什么状态的男朋友？</h1>
<p><small>回答：2017-09-14 14:25｜更新：2017-09-14 14:30｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/65334574/answer/229899214">https://www.zhihu.com/question/65334574/answer/229899214</a></small></p><hr><p data-pid="BJTUO0Gc">这个问题，我答不上来。</p><p data-pid="1QZFzXGD">不如问主贴一个生辰八字，我帮忙邀请几个知乎神棍就来根据八字，看看什么时候比较容易有桃花和姻缘。</p><p data-pid="_yGk55Y_">按照八字的理论，有的人就是会比较晚婚，有的就是会比较早婚。</p><p data-pid="PJhGMnce">可是根据大运流年，会有一段时间比较容易成就姻缘，也能大概看出什么样的另一半适合你。</p></body></html>
