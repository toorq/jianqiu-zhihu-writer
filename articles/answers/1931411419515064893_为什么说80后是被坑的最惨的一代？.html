<p><small>回答：2025-07-23 17:52｜更新：2025-07-23 18:17｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/595534393/answer/1931411419515064893">https://www.zhihu.com/question/595534393/answer/1931411419515064893</a></small></p><hr><p data-pid="KVqf9Ww9">前几年考公都不要35岁以上的，这几年不要40岁以上的了，我恍然大悟，原来是80后更老了一点……</p><hr><p data-pid="ldCfhpHB">找工作的时候，说你40太老了。</p><p data-pid="pBMWWpme">退休可以领退休金的时候，说你60了，还能再干几年。</p><p data-pid="SVrOMV8o">知乎上其实很多搞团建的，都没有喷在点子上，体制内外的巨大鸿沟，才是最大的槽点……</p></body></html>
