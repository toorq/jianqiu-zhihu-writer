<p><small>回答：2026-04-17 06:27｜更新：2026-04-17 06:27｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/665790566/answer/2028359006373037870">https://www.zhihu.com/question/665790566/answer/2028359006373037870</a></small></p><hr><p data-pid="frPdWbVw">看到有讽刺黑人和穆斯林落后的答案。</p><p data-pid="VbWm4Wf2">我看了都想笑。</p><p data-pid="X582qP_n">发展到把生物繁衍本能都整没了的发展，也敢自诩更先进？</p><hr><p data-pid="0ZO4tGL8">生物个体的减少必然导致族群抗风险能力降低。</p><p data-pid="VZKNhfjg">看似毫无用处的传统文化更是身份和文化认同的基石。</p><p data-pid="t-GMrD4_">所以，哪个文明能笑到最后，真的不能看什么现在GDP有多高。</p></body></html>
