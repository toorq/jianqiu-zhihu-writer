</style></head><body><h1>掌法比拳的优势在哪里？</h1>
<p><small>回答：2014-08-17 20:09｜更新：2016-12-18 17:06｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/24874660/answer/29320114">https://www.zhihu.com/question/24874660/answer/29320114</a></small></p><hr><p data-pid="y95eA1Dc">传统武术有一句话：拳不如掌，掌不如指。武术上以掌破拳，以指破掌都比较好用。</p><p data-pid="TMKUKK1t">是非常有道理的，谁练谁知道。</p><p data-pid="rBTcwbC-">至于有兄弟回答说掌法化成拳是非什么意思的。一般掌法最狠的是掌变爪，一掌之后迅速变爪，爪骨头，穴位，再打一个反向的力。</p><p data-pid="6T1_Nd7h">当然也不是绝对的，武术招式只有合适，没有绝对的强和弱。</p></body></html>
