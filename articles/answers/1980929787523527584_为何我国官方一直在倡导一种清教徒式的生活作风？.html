</style></head><body><h1>为何我国官方一直在倡导一种清教徒式的生活作风？</h1>
<p><small>回答：2025-12-07 09:21｜更新：2025-12-07 09:21｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/25063299/answer/1980929787523527584">https://www.zhihu.com/question/25063299/answer/1980929787523527584</a></small></p><hr><p data-pid="Hz64rIUZ">懂了，</p><p data-pid="QdXqD2vG">不就是良家子么，</p><p data-pid="vkvnNnGK">无不良嗜好，爱国爱家有担当，辛苦工作，努力养家，战时踊跃参军奉献自己的中华脊梁。</p><p data-pid="QD9y2aID">所以一切的一切，什么女权，什么消费主义，什么拜金主义，什么原生家庭，什么自由主义……</p><p data-pid="z-zWaWZy">都是为了在思想上摧毁良家子。</p><p data-pid="j3buoRAA">还好教员的思想还在，文明的免疫力比较强，没被忽悠瘸。</p></body></html>
