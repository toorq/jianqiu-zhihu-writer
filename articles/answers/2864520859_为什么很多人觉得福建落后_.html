</style></head><body><h1>为什么很多人觉得福建落后?</h1>
<p><small>回答：2023-01-28 21:55｜更新：2023-01-28 21:55｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/544270302/answer/2864520859">https://www.zhihu.com/question/544270302/answer/2864520859</a></small></p><hr><p data-pid="lS7IiwVw">是呀，福建人真的很穷的，快点干对面呀，我们等了几十年了。</p><p data-pid="CEwBZ7J9">干完多给我们一点投资，我们一定带着对面兄弟省份一起发财。</p><p data-pid="IseUHjBJ">还有旁边的浙大哥和粤大哥，多带带弟弟。</p><p data-pid="GmkIPgQG">什么，粤大哥说我吗人均GDP和他差不多，没有的事情，我们的GDP都是泡沫。福建八山一水一田的老难发展了。</p></body></html>
