</style></head><body><h1>饺子能不能成为中国的宫崎骏?</h1>
<p><small>回答：2025-02-18 10:16｜更新：2025-02-21 11:26｜赞同：0｜评论：0<br>原文：<a href="https://www.zhihu.com/question/12421579934/answer/103786257649">https://www.zhihu.com/question/12421579934/answer/103786257649</a></small></p><hr><p data-pid="34aNMyGk">自信点，今天的中国已经不需要我们成为谁的影子来证明自己的存在了。</p><p data-pid="L4JMd_7E">宫崎骏可以伟大，</p><p data-pid="zACSL8FG">饺子也可以伟大，</p><p data-pid="0iW0fQy2">宫崎骏的伟大不影响饺子的伟大，</p><p data-pid="fwSeeF-M">饺子的伟大也不影响空气机的伟大。</p></body></html>
